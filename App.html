<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Theme Variables - Light (Default) */
      --bg-main: #f0f2f5;
      --board-bg: #ffffff;
      --grid-border: rgba(0,0,0,0.1);
      --text-primary: #2c3e50;
      --hud-bg: rgba(255, 255, 255, 0.9);
      --glass-border: rgba(255, 255, 255, 0.4);
      
      --red-solid: #ff3333;
      --green-solid: #00e64d;
      --blue-solid: #3385ff;
      --yellow-solid: #ffea00;
      
      --red-grad: var(--red-solid);
      --green-grad: var(--green-solid);
      --yellow-grad: var(--yellow-solid);
      --blue-grad: var(--blue-solid);
      
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
      --star-fill: rgba(0,0,0,0.1);
    }

    body[data-theme="dark"] {
      --bg-main: #050505; 
      --board-bg: #121212; 
      --grid-border: #2a2a2a; 
      --text-primary: #ffffff;
      --hud-bg: #1a1a1a; 
      --glass-border: #333333;
      --shadow: 0 4px 25px rgba(0, 0, 0, 0.8);
      --star-fill: rgba(255,255,255,0.15);
      
      --red-solid: #ff3333;
      --green-solid: #00e64d;
      --blue-solid: #3385ff;
      --yellow-solid: #ffea00;
      
      --red-grad: #2a0000; 
      --green-grad: #002a00;
      --yellow-grad: #2a2a00;
      --blue-grad: #00002a;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
    
    body, .hud, .modal-box, .cell, #board-container, #footer-controls { 
      transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease; 
    }

    body { 
      font-family: 'Poppins', sans-serif; 
      background: var(--bg-main);
      margin: 0; padding: 10px; 
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; color: var(--text-primary); overflow: hidden;
    }

    #theme-toggle {
      position: fixed; top: 20px; right: 20px; z-index: 2000;
      width: 45px; height: 45px; border-radius: 50%; background: var(--hud-bg);
      border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center;
      cursor: pointer; box-shadow: var(--shadow); font-size: 20px;
    }

    #game-wrapper {
      display: grid; grid-template-columns: 140px 1fr 140px; grid-template-rows: auto 1fr auto; gap: 20px;
      max-width: 100vw; align-items: center;
    }

    .hud {
      background: var(--hud-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border-radius: 12px; padding: 15px; border: 1px solid var(--glass-border);
      display: flex; flex-direction: column; align-items: center;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); min-width: 130px; box-shadow: var(--shadow);
    }
    .hud.active { transform: scale(1.05); border-color: var(--text-primary); box-shadow: 0 0 20px rgba(255,255,255,0.1); }

    .avatar {
      width: 60px; height: 60px; border-radius: 12px; border: 2px solid var(--glass-border);
      background: #34495e; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; position: relative;
      font-size: 24px;
    }
    body[data-theme="dark"] .avatar { background: #121212; }

    .placement-badge { 
      position: absolute; top: -12px; right: -12px; color: #333; padding: 4px 10px; 
      border-radius: 8px; font-size: 11px; font-weight: 800; border: 2px solid white; box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      animation: badgePop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes badgePop { from { transform: scale(0); } to { transform: scale(1); } }
    .badge-1 { background: #ffd700; }
    .badge-2 { background: #e0e0e0; }
    .badge-3 { background: #cd7f32; color: white; }

    .player-name { font-weight: 600; font-size: 13px; text-transform: uppercase; margin-bottom: 8px; text-align: center; color: var(--text-primary); }
    
    #board-container {
      grid-column: 2; grid-row: 1 / 4; position: relative;
      width: 90vw; height: 90vw; max-width: 600px; max-height: 600px;
      background: var(--grid-border); border: 4px solid var(--grid-border); border-radius: 8px; box-shadow: var(--shadow);
      aspect-ratio: 1 / 1;
    }
    #board { display: grid; grid-template-columns: repeat(15, 1fr); grid-template-rows: repeat(15, 1fr); width: 100%; height: 100%; background: var(--board-bg); border-radius: 4px; overflow: hidden; }
    .cell { border: 1px solid var(--grid-border); position: relative; background: var(--board-bg); }
    
    /* Bases */
    .red-base { background: var(--red-grad) !important; }
    .green-base { background: var(--green-grad) !important; }
    .blue-base { background: var(--blue-grad) !important; }
    .yellow-base { background: var(--yellow-grad) !important; }
    
    .base-container { position: absolute; top: 0; left: 0; width: 600%; height: 600%; display: flex; align-items: center; justify-content: center; pointer-events: none; }
    .base-inner {
      width: 70%; height: 70%; background: var(--hud-bg); border-radius: 15%;
      display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; padding: 12px; gap: 12px;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.1);
    }
    .base-red .base-inner { border: 2px solid var(--red-solid); }
    .base-green .base-inner { border: 2px solid var(--green-solid); }
    .base-blue .base-inner { border: 2px solid var(--blue-solid); }
    .base-yellow .base-inner { border: 2px solid var(--yellow-solid); }
    .slot { border-radius: 50%; border: 1px solid var(--grid-border); background: rgba(0,0,0,0.02); }

    /* Stretches & Center */
    .home-stretch.red { background: var(--red-solid) !important; }
    .home-stretch.green { background: var(--green-solid) !important; }
    .home-stretch.yellow { background: var(--yellow-solid) !important; }
    .home-stretch.blue { background: var(--blue-solid) !important; }
    .home-center { background: var(--board-bg); }
    
    .center-tri { position: absolute; width: 100%; height: 100%; }
    .tri-top { background: var(--green-solid); opacity: 0.6; clip-path: polygon(50% 50%, 0 0, 100% 0); }
    .tri-bottom { background: var(--blue-solid); opacity: 0.6; clip-path: polygon(50% 50%, 0 100%, 100% 100%); }
    .tri-left { background: var(--red-solid); opacity: 0.6; clip-path: polygon(50% 50%, 0 0, 0 100%); }
    .tri-right { background: var(--yellow-solid); opacity: 0.6; clip-path: polygon(50% 50%, 100% 0, 100% 100%); }

    .safe-zone { background: rgba(0,0,0,0.05) !important; }
    body[data-theme="dark"] .safe-zone { background: rgba(255,255,255,0.05) !important; }

    .star-icon { position: absolute; width: 70%; height: 70%; top: 15%; left: 15%; fill: var(--star-fill); }

    .piece {
      border-radius: 50%; position: absolute; z-index: 10;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      cursor: pointer; border: 2px solid rgba(255,255,255,0.8);
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .piece.red { background: var(--red-solid); }
    .piece.green { background: var(--green-solid); }
    .piece.yellow { background: var(--yellow-solid); }
    .piece.blue { background: var(--blue-solid); }
    
    body[data-theme="dark"] .piece { border-width: 2px; }
    body[data-theme="dark"] .piece.red { border-color: #ffcccc; box-shadow: 0 0 15px rgba(255,51,51,0.4); }
    body[data-theme="dark"] .piece.green { border-color: #ccffdd; box-shadow: 0 0 15px rgba(0,230,77,0.4); }
    body[data-theme="dark"] .piece.blue { border-color: #cce0ff; box-shadow: 0 0 15px rgba(51,133,255,0.4); }
    body[data-theme="dark"] .piece.yellow { border-color: #ffffcc; box-shadow: 0 0 15px rgba(255,234,0,0.4); }

    .piece.playable { animation: bounce 0.8s infinite; z-index: 30; border-color: white; }
    @keyframes bounce { 0%, 100% { transform: scale(1) translateY(0); filter: brightness(1.2); } 50% { transform: scale(1.1) translateY(-10px); } }

    #login-screen, #reconnect-modal { 
      position: fixed; top:0; left:0; width:100%; height:100%; 
      background: rgba(0,0,0,0.8); backdrop-filter: blur(15px);
      z-index: 1000; display: flex; align-items: center; justify-content: center;
    }
    .modal-box { 
      background: var(--hud-bg); color: var(--text-primary); padding: 40px; border-radius: 20px; 
      text-align: center; box-shadow: var(--shadow); max-width: 420px; width: 92%;
      border: 1px solid var(--glass-border);
    }
    .modal-box input, .modal-box select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--grid-border); font-size: 16px; background: var(--board-bg); color: var(--text-primary); }

    .btn { 
      background: linear-gradient(to bottom, #f39c12, #d35400); color: white; border: none; padding: 16px 24px; border-radius: 12px; 
      font-weight: 800; font-size: 15px; cursor: pointer; width: 100%; margin-top: 12px;
    }
    .btn:active { transform: translateY(2px); }
    
    #footer-controls { background: var(--hud-bg); backdrop-filter: blur(10px); padding: 10px 25px; border-radius: 40px; border: 1px solid var(--glass-border); color: var(--text-primary); display: flex; align-items: center; gap: 20px; }

    #dice-button {
      width: 60px; height: 60px; background: #ffffff; border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5), inset 0 -3px 5px rgba(0,0,0,0.2);
      display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 4px; padding: 8px; cursor: pointer;
      transition: box-shadow 0.3s, transform 0.1s;
    }
    #dice-button:active { transform: scale(0.95); }
    .pip { background-color: #333; border-radius: 50%; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); display: none; }
    
    #dice-button.roll-1 .pip:nth-child(5) { display: block; }
    #dice-button.roll-2 .pip:nth-child(1), #dice-button.roll-2 .pip:nth-child(9) { display: block; }
    #dice-button.roll-3 .pip:nth-child(1), #dice-button.roll-3 .pip:nth-child(5), #dice-button.roll-3 .pip:nth-child(9) { display: block; }
    #dice-button.roll-4 .pip:nth-child(1), #dice-button.roll-4 .pip:nth-child(3), #dice-button.roll-4 .pip:nth-child(7), #dice-button.roll-4 .pip:nth-child(9) { display: block; }
    #dice-button.roll-5 .pip:nth-child(1), #dice-button.roll-5 .pip:nth-child(3), #dice-button.roll-5 .pip:nth-child(5), #dice-button.roll-5 .pip:nth-child(7), #dice-button.roll-5 .pip:nth-child(9) { display: block; }
    #dice-button.roll-6 .pip:nth-child(1), #dice-button.roll-6 .pip:nth-child(3), #dice-button.roll-6 .pip:nth-child(4), #dice-button.roll-6 .pip:nth-child(6), #dice-button.roll-6 .pip:nth-child(7), #dice-button.roll-6 .pip:nth-child(9) { display: block; }

    #dice-button.shaking { animation: diceShake 0.5s linear; pointer-events: none; }
    @keyframes diceShake { 0%, 100% { transform: rotate(0deg) scale(1); } 25% { transform: rotate(15deg) scale(1.1); } 50% { transform: rotate(-15deg) scale(1.1); } 75% { transform: rotate(15deg) scale(1.1); } }

    .color-btn { width: 65px; height: 65px; border-radius: 15px; border: 4px solid transparent; cursor: pointer; transition: 0.2s; box-shadow: var(--shadow); }
    .color-btn.selected { border-color: var(--text-primary); transform: scale(1.1); }
    .difficulty-slider { width: 100%; margin: 15px 0; accent-color: #f39c12; }
    .hidden { display: none !important; }

    @media (max-width: 900px) {
      #game-wrapper { grid-template-columns: 1fr 1fr; grid-template-rows: auto auto auto auto; gap: 10px; }
      #board-container { grid-column: 1 / 3; grid-row: 2; width: 95vw; height: 95vw; }
    }
  </style>
</head>
<body data-theme="light">

  <div id="theme-toggle" onclick="toggleTheme()">🌙</div>

  <div id="login-screen">
    <div class="modal-box" id="mode-selection">
      <h1 style="margin-top:0;">🎲 LUDO KING</h1>
      <button class="btn" onclick="showLobbySetup('online')">PLAY ONLINE</button>
      <button class="btn" style="background:var(--green-solid)" onclick="showLocalSetup('local')">PASS & PLAY</button>
      <button class="btn" style="background:var(--blue-solid)" onclick="showLocalSetup('ai')">PLAY COMPUTER</button>
    </div>

    <div class="modal-box hidden" id="online-lobby">
       <h2>ONLINE LOBBY</h2>
       <div id="online-pre-join">
          <button class="btn" onclick="showCreateRoom()">CREATE ROOM</button>
          <button class="btn" style="background:var(--blue-solid)" onclick="showJoinRoom()">JOIN ROOM</button>
          <button class="btn" style="background:#95a5a6" onclick="backToModes()">BACK</button>
       </div>
       <div id="room-setup" class="hidden">
          <h3 id="setup-title">Setup</h3>
          <input type="text" id="playerName" placeholder="Your Name">
          <div id="color-select-area">
            <p>Select Color:</p>
            <select id="playerColor">
              <option value="red">RED</option>
              <option value="green">GREEN</option>
              <option value="yellow">YELLOW</option>
              <option value="blue">BLUE</option>
            </select>
          </div>
          <input type="text" id="gameIdInput" class="hidden" placeholder="Room Code">
          <button class="btn" id="setup-action-btn" onclick="initOnlineGame()">GO</button>
          <button class="btn" style="background:#95a5a6" onclick="showLobbySetup('online')">BACK</button>
       </div>
    </div>

    <div class="modal-box hidden" id="local-setup">
      <h2 id="local-setup-title">GAME SETUP</h2>
      <div id="local-players-config" class="hidden">
         <p>Number of Players:</p>
         <div style="display:flex; justify-content:center; gap:10px; margin:10px 0;">
           <button class="btn" style="width:auto; min-width:60px; margin:0;" onclick="setLocalPlayerCount(2)">2</button>
           <button class="btn" style="width:auto; min-width:60px; margin:0;" onclick="setLocalPlayerCount(3)">3</button>
           <button class="btn" style="width:auto; min-width:60px; margin:0;" onclick="setLocalPlayerCount(4)">4</button>
         </div>
         <button class="btn" onclick="initLocalGame()">START MATCH</button>
      </div>
      <div id="ai-config" class="hidden">
         <p>AI Strength: <span id="difficulty-label" style="font-weight:800; color:#f39c12;">Normal</span></p>
         <input type="range" id="aiDifficulty" class="difficulty-slider" min="1" max="4" value="2" oninput="updateBotRoster(selectedAIColor)">
         <p>Play As:</p>
         <div style="display:flex; justify-content:center; gap:12px; margin:15px 0;">
           <div class="color-btn" id="btn-red" style="background:var(--red-solid)" onclick="selectAIColor('red')"></div>
           <div class="color-btn" id="btn-green" style="background:var(--green-solid)" onclick="selectAIColor('green')"></div>
           <div class="color-btn" id="btn-yellow" style="background:var(--yellow-solid)" onclick="selectAIColor('yellow')"></div>
           <div class="color-btn" id="btn-blue" style="background:var(--blue-solid)" onclick="selectAIColor('blue')"></div>
         </div>
         <div style="text-align:left; margin-top:20px; background:rgba(0,0,0,0.05); padding:15px; border-radius:12px; border: 1px solid var(--grid-border);">
            <p style="margin:0 0 10px 0; font-weight:800; font-size:12px; opacity:0.6; text-transform:uppercase; letter-spacing:1px;">Opponents:</p>
            <div id="bot-roster-list" style="font-size:14px; font-weight:600;"></div>
         </div>
         <button class="btn" onclick="startAIGame()">START BATTLE</button>
      </div>
      <button class="btn" style="background:#95a5a6; margin-top:20px;" onclick="backToModes()">BACK</button>
    </div>
  </div>

  <div id="reconnect-modal" class="hidden">
    <div class="modal-box">
      <h2>RECONNECTING...</h2>
      <div style="margin: 20px 0;">
        <svg width="50" height="50" viewBox="0 0 50 50">
          <circle cx="25" cy="25" r="20" fill="none" stroke="#e67e22" stroke-width="5" stroke-dasharray="31.4" stroke-linecap="round">
            <animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1s" repeatCount="indefinite"/>
          </circle>
        </svg>
      </div>
    </div>
  </div>

  <div id="game-wrapper" class="hidden">
    <div class="hud red-hud" id="hud-red">
      <div class="avatar">👤</div>
      <div class="player-name" id="name-red">Waiting...</div>
      <div class="dice-container" id="dice-container-red"></div>
    </div>
    <div class="hud green-hud" id="hud-green">
      <div class="avatar">👤</div>
      <div class="player-name" id="name-green">Waiting...</div>
      <div class="dice-container" id="dice-container-green"></div>
    </div>
    <div id="board-container">
      <div id="board"></div>
      <div id="pieces-layer" style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none;"></div>
    </div>
    <div class="hud blue-hud" id="hud-blue">
      <div class="avatar">👤</div>
      <div class="player-name" id="name-blue">Waiting...</div>
      <div class="dice-container" id="dice-container-blue"></div>
    </div>
    <div class="hud yellow-hud" id="hud-yellow">
      <div class="avatar">👤</div>
      <div class="player-name" id="name-yellow">Waiting...</div>
      <div class="dice-container" id="dice-container-yellow"></div>
    </div>
  </div>

  <div id="footer-controls" style="margin-top: 20px; display: flex; gap: 15px; align-items: center;" class="hidden">
    <div style="font-weight: bold; background: rgba(0,0,0,0.1); padding: 5px 15px; border-radius: 20px;">
      ROOM: <span id="room-code-display">----</span>
    </div>
    <div id="dice-button" onclick="rollDice()">
      <div class="pip"></div><div class="pip"></div><div class="pip"></div>
      <div class="pip"></div><div class="pip"></div><div class="pip"></div>
      <div class="pip"></div><div class="pip"></div><div class="pip"></div>
    </div>
    <button id="start-game-btn" class="btn hidden" style="width:auto; padding: 5px 15px; background:var(--green-solid); margin:0; box-shadow:none;" onclick="handleStartGame()">START GAME</button>
    <button class="btn" style="width:auto; padding: 5px 15px; background:#c0392b; margin:0; box-shadow:none;" onclick="quitToMenu()">QUIT</button>
    <button class="btn" id="mute-btn" style="width:auto; padding: 5px 15px; background:#7f8c8d; margin:0; box-shadow:none;" onclick="audioHaptic.toggleMute()">🔊</button>
  </div>

  <script>
    /** AUDIO & HAPTICS **/
    const audioHaptic = {
      ctx: null, isMuted: false,
      init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
      toggleMute() { this.isMuted = !this.isMuted; document.getElementById('mute-btn').innerText = this.isMuted ? '🔇' : '🔊'; },
      beep(freq, type, dur, vol) {
        if (this.isMuted) return; this.init();
        const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + dur);
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.start(); osc.stop(this.ctx.currentTime + dur);
      },
      diceRoll() { this.beep(400, 'square', 0.1, 0.1); if(navigator.vibrate) navigator.vibrate(20); },
      pieceHop() { this.beep(600, 'sine', 0.05, 0.1); if(navigator.vibrate) navigator.vibrate(10); },
      capture() { this.beep(150, 'sawtooth', 0.3, 0.2); if(navigator.vibrate) navigator.vibrate([50, 50, 100, 50, 200]); },
      playerFinish() { this.beep(800, 'triangle', 0.5, 0.2); if(navigator.vibrate) navigator.vibrate([100, 100, 100, 100, 300]); },
      gameEnd() { this.beep(400, 'triangle', 0.8, 0.3); if(navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 500]); }
    };

    /** STATE & NETWORKING **/
    let currentGameId = null, myColor = null, myName = null, gameState = null, gameMode = 'online';
    let pollTimer = null, aiTimer = null, localPlayerCount = 2, isAnimating = false, isCreating = true;
    let pollRetryCount = 0, backoffDelay = 1000, localStateVersion = 0;
    let isRequestPending = false, retryTimeout = null, selectedAIColor = 'red';
    let lastStatus = null, lastPieces = null, lastSeenRollId = null, isDiceAnimating = false;

    const connectivityHUD = {
      update(status) {
        const colors = { online: '#27ae60', busy: '#f1c40f', error: '#e74c3c' };
        let dot = document.getElementById('conn-dot');
        if (!dot) {
          const footer = document.getElementById('footer-controls');
          if (!footer) return;
          const hud = document.createElement('div');
          hud.id = 'conn-hud';
          hud.style = 'display:flex; align-items:center; gap:5px; font-size:12px; font-weight:bold; margin-right: 15px;';
          hud.innerHTML = `<div id="conn-dot" style="width:10px; height:10px; border-radius:50%; background:${colors.online}"></div> <span id="conn-text">ONLINE</span>`;
          footer.prepend(hud);
          dot = document.getElementById('conn-dot');
        }
        dot.style.background = colors[status] || colors.online;
        document.getElementById('conn-text').innerText = status.toUpperCase();
      }
    };

    const COLORS = ['red', 'green', 'yellow', 'blue'];

    function executeLocalMove(color, idx) {
      const roll = gameState.dice.value, cur = gameState.pieces[color][idx], next = (cur===-1)?0:cur+roll;
      let captured = false;
      if (next >= 0 && next <= 51) { 
        const gIdx = getGlobalIndex(color, next); const coords = SHARED_TRACK[gIdx];
        const cell = document.getElementById(`cell-${coords[0]}-${coords[1]}`);

           COLORS.forEach(c => { if (c !== color) { gameState.pieces[c] = gameState.pieces[c].map(p => { if (p >= 0 && p <= 51 && getGlobalIndex(c, p) === gIdx) { captured = true; return -1; } return p; }); } }); 
        }
      }
      gameState.pieces[color][idx] = next; const finished = gameState.pieces[color].filter(p => p === 57).length;
      if (finished === 4 && !gameState.placements.includes(color)) gameState.placements.push(color);
      const active = Object.keys(gameState.players).filter(c => gameState.players[c]);
      if (gameState.placements.length >= active.length - 1) { gameState.status = 'gameOver'; updateUI(gameState); }
      else { if (roll === 6 || captured || finished === 4) { gameState.dice.hasRolled = false; gameState.dice.value = null; updateUI(gameState); if (gameMode === 'ai' && gameState.bots[color]) setTimeout(executeAITurn, 1000); } else advanceTurn(); }
    }
    function executeAITurn() {
      if (!gameState || gameState.status !== 'playing') return;
      const color = gameState.currentTurn; if (!gameState.bots || !gameState.bots[color]) return;
      executeLocalRoll(color); if (!gameState.dice.hasRolled) return;
      const roll = gameState.dice.value, legal = []; gameState.pieces[color].forEach((p, i) => { if (isMoveLegal(p, roll)) legal.push(i); });
      if (legal.length > 0) {
        let bIdx = legal[0], max = -1000;
        legal.forEach(idx => { 
          const p = gameState.pieces[color][idx], next = (p===-1)?0:p+roll; let s = next; 
          if (next >= 0 && next <= 51) { const g = getGlobalIndex(color, next); COLORS.forEach(c => { if(c!==color && gameState.pieces[c].some(cp => cp>=0&&cp<=51&&getGlobalIndex(c,cp)===g)) s += 100; }); } 
          if (next === 57) s += 80; if (p === -1 && roll === 6) s += 60; if (s > max) { max = s; bIdx = idx; } 
        });
        setTimeout(() => { const cur = gameState.pieces[color][bIdx]; animatePieceHop(color, bIdx, cur, (cur===-1)?0:cur+roll).then(() => executeLocalMove(color, bIdx)); }, 500);

    }

    function updateUI(s) {

      if (lastPieces && s.status === 'playing') { let captured = false; COLORS.forEach(c => { s.pieces[c].forEach((p, i) => { if (p === -1 && lastPieces[c] && lastPieces[c][i] !== -1) captured = true; }); }); if (captured) audioHaptic.capture(); }

    }

    function renderPieces(s) {
      const layer = document.getElementById('pieces-layer'); layer.style.pointerEvents = 'none'; const groups = {}; COLORS.forEach(c => { s.pieces[c].forEach((p, i) => { let k = (p === -1) ? `b-${c}-${i}` : (p >= 57) ? `f` : (p >= 52) ? `h-${c}-${p}` : `t-${getGlobalIndex(c, p)}`; if (!groups[k]) groups[k] = []; groups[k].push({ c, p, i }); }); });
      COLORS.forEach(c => {
        s.pieces[c].forEach((p, i) => {
          let el = document.getElementById(`piece-${c}-${i}`); if (!el) { el = document.createElement('div'); el.id = `piece-${c}-${i}`; el.className = `piece ${c}`; layer.appendChild(el); }
          if (el.dataset.animating === 'true') return;
          const coords = getPieceCoords(c, p, i), bW = document.getElementById('board-container').clientWidth, cS = bW / 15;
          let t = coords[0]*cS+cS*0.1, l = coords[1]*cS+cS*0.1, tr = '';
          let k = (p === -1) ? `b-${c}-${i}` : (p >= 57) ? `f` : (p >= 52) ? `h-${c}-${p}` : `t-${getGlobalIndex(c, p)}`;
          const pcs = groups[k];
          if (pcs.length > 1 && p !== -1 && p < 57) { const idxInGroup = pcs.findIndex(x => x.c === c && x.i === i); const o = cS*0.18, os = [[-o,-o], [o,-o], [-o,o], [o,o]]; const [ox, oy] = os[idxInGroup%4]; tr = `translate(${ox}px, ${oy}px) scale(0.75)`; }
          el.style.top = t+'px'; el.style.left = l+'px'; el.style.width = el.style.height = (cS*0.8)+'px'; el.style.transform = tr;
          el.classList.remove('playable'); el.style.pointerEvents = 'none'; el.onclick = null;
          if (!isAnimating && !isDiceAnimating && (s.currentTurn === myColor || gameMode === 'local' || (gameMode === 'ai' && s.currentTurn === myColor)) && c === s.currentTurn && s.dice.hasRolled && isMoveLegal(p, s.dice.value)) { el.classList.add('playable'); el.style.pointerEvents = 'auto'; el.onclick = () => movePiece(i); layer.style.pointerEvents = 'auto'; }
        });
      });
    }

    document.addEventListener("DOMContentLoaded", () => { initBoard(); initTheme(); });
    window.addEventListener('resize', () => { if(gameState) updateUI(gameState); });
    document.addEventListener("visibilitychange", () => { if (!document.hidden && gameMode === 'online') poll(); });
  </script>
</body>
</html>
