<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@500;700&display=swap');

  :root {
    --bg-color-top: #1e3c72;
    --bg-color-bottom: #2a5298;
    --panel-bg: rgba(26, 54, 117, 0.85); 
    --text-color: #ffffff;
    --primary-color: #ffd000; 
    --primary-hover: #ffea00;
    --accent-color: #00e1ff; 
    --red: #ff2a5f;
    --blue: #00a2ff;
    --green: #00e047;
    --yellow: #ffd500;
    --board-bg: #fcfcfc;
    --border-color: #ffffff;
  }

  * { box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }
  
  body {
    margin: 0; padding: 0;
    background: radial-gradient(circle at top, var(--bg-color-top), var(--bg-color-bottom));
    color: var(--text-color);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  h1, h2, h3 { text-align: center; margin-top: 0; font-family: 'Montserrat', sans-serif; }

  #ui-container {
    width: 100%; max-width: 600px;
    padding: 20px;
  }

  .menu-screen {
    background: var(--panel-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 30px;
    border-radius: 20px;
    border: 2px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.2);
  }

  .hidden { display: none !important; }

  .menu-buttons {
    display: flex; flex-direction: column; gap: 15px; margin-top: 20px;
  }

  button {
    background: linear-gradient(145deg, var(--primary-color), #ff9d00);
    color: #111; 
    border: none; 
    border-radius: 30px;
    padding: 16px 20px; 
    font-size: 18px; 
    font-weight: 800;
    cursor: pointer; 
    transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
    text-transform: uppercase; 
    letter-spacing: 1.5px;
    box-shadow: 0 6px 15px rgba(255, 208, 0, 0.3), inset 0 2px 0 rgba(255,255,255,0.5);
  }
  
  button:hover { 
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(255, 208, 0, 0.5), inset 0 2px 0 rgba(255,255,255,0.6);
  }
  button:active { 
    transform: translateY(2px) scale(0.98); 
    box-shadow: 0 2px 5px rgba(255, 208, 0, 0.3);
  }
  button:disabled { background: #555; cursor: not-allowed; color: #aaa; box-shadow:none; }
  
  .back-btn { 
    background: linear-gradient(145deg, var(--accent-color), #0088ff); 
    color: white; 
    box-shadow: 0 6px 15px rgba(0, 225, 255, 0.3), inset 0 2px 0 rgba(255,255,255,0.4);
  }
  .back-btn:hover { 
    box-shadow: 0 8px 20px rgba(0, 225, 255, 0.5), inset 0 2px 0 rgba(255,255,255,0.5);
  }

  .color-btn {
    cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; outline: none;
    box-shadow: 0 4px 10px rgba(0,0,0,0.4), inset 0 2px 5px rgba(255,255,255,0.3);
  }
  .color-btn:hover:not(.disabled) { transform: scale(1.15); }
  .color-btn.selected { border-color: white !important; box-shadow: 0 0 15px white, inset 0 2px 5px rgba(255,255,255,0.5); transform: scale(1.15); }
  .color-btn.disabled { opacity: 0.2; cursor: not-allowed; filter: grayscale(100%); }

  input[type="text"], select {
    width: 100%; padding: 14px; border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.1); 
    background: rgba(0,0,0,0.3); color: white;
    font-size: 16px; margin-bottom: 10px; outline: none;
    font-weight: 700; transition: border-color 0.2s;
  }
  input[type="text"]:focus, select:focus { border-color: var(--accent-color); background: rgba(0,0,0,0.4); }

  input[type="range"] {
    -webkit-appearance: none; background: transparent; width: 100%; margin: 10px 0;
  }
  input[type="range"]::-webkit-slider-runnable-track {
    width: 100%; height: 10px; cursor: pointer; background: rgba(0,0,0,0.4); border-radius: 5px; border: 1px solid var(--accent-color);
  }
  input[type="range"]::-webkit-slider-thumb {
    height: 28px; width: 28px; border-radius: 50%; background: linear-gradient(145deg, var(--primary-color), #ff9d00); cursor: pointer; -webkit-appearance: none; margin-top: -10px; box-shadow: 0 0 8px rgba(0,0,0,0.6); border: 2px solid white;
  }

  .join-section { display: flex; gap: 10px; }
  .join-section input { flex: 1; margin-bottom: 0; }
  .join-section button { white-space: nowrap; }

  .status-msg { text-align: center; margin-top: 15px; color: #ddd; min-height: 20px; font-weight: bold; }

  .players-list {
    background: rgba(0,0,0,0.3); border-radius: 12px; padding: 12px;
    min-height: 100px; margin-bottom: 20px; border: 2px solid rgba(255,255,255,0.1);
  }
  .player-item {
    padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; font-weight: 700;
  }
  .player-item:last-child { border-bottom: none; }
  .color-dot {
    width: 16px; height: 16px; border-radius: 50%; margin-right: 12px; display: inline-block;
    box-shadow: 0 2px 5px rgba(0,0,0,0.5), inset 0 2px 2px rgba(255,255,255,0.4);
  }

  #game-screen {
    width: 100%; height: 100vh;
    display: flex; flex-direction: column;
    padding: 10px;
  }

  .game-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px; flex-shrink: 0;
  }

  .turn-box {
    padding: 10px 22px; border-radius: 25px; font-weight: 900;
    background: #333; transition: background-color 0.3s;
    border: 3px solid rgba(255,255,255,0.6); box-shadow: 0 6px 15px rgba(0,0,0,0.6);
    text-shadow: 0 1px 3px rgba(0,0,0,0.4); letter-spacing: 0.5px;
  }

  .canvas-container {
    flex: 1; display: flex; justify-content: center; align-items: center;
    overflow: hidden; max-height: calc(100vw - 20px);
    padding: 5px; position: relative;
  }

  canvas {
    background-color: var(--board-bg);
    box-shadow: 0 20px 50px rgba(0,0,0,0.7);
    border: 8px solid #f0f0f0;
    border-radius: 20px; max-width: 100%; max-height: 100%;
    object-fit: contain; cursor: pointer;
  }

  .game-controls {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 15px; padding: 15px; 
    background: rgba(26, 54, 117, 0.9); backdrop-filter: blur(8px);
    border: 2px solid rgba(255,255,255,0.2); border-radius: 20px; flex-shrink: 0;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  }

  .dice-container {
    width: 65px; height: 65px; background: linear-gradient(135deg, #ffffff, #e0e0e0); border-radius: 16px;
    display: flex; justify-content: center; align-items: center;
    font-size: 34px; color: black; cursor: pointer;
    box-shadow: 0 8px 15px rgba(0,0,0,0.4), inset 0 -3px 5px rgba(0,0,0,0.1);
    transition: transform 0.1s; user-select: none;
    border: 2px solid #ccc;
  }
  .dice-container:active { transform: scale(0.9); }

  @keyframes flipDice {
    0% { transform: rotateX(0deg) rotateY(0deg) scale(1); }
    25% { transform: rotateX(180deg) rotateY(90deg) scale(1.2); }
    50% { transform: rotateX(360deg) rotateY(180deg) scale(1.1); }
    75% { transform: rotateX(540deg) rotateY(270deg) scale(1.2); }
    100% { transform: rotateX(720deg) rotateY(360deg) scale(1); }
  }

  #action-status { flex: 1; text-align: center; font-size: 19px; font-weight: 800; padding: 0 10px; color: var(--primary-color); text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

  #quit-btn { background: linear-gradient(145deg, #ff4757, #ff1e3c); padding: 10px 18px; color: white; box-shadow: 0 4px 10px rgba(255, 71, 87, 0.4); }

  .emoji-btn {
    background: rgba(255,255,255,0.1); padding:5px; font-size:20px;
    border-radius:50%; width:44px; height:44px; border:2px solid rgba(255,255,255,0.3);
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.4); transition: transform 0.2s; cursor: pointer;
  }
  .emoji-btn:hover { transform: scale(1.15); background: rgba(255,255,255,0.2); }
  
  .emoji-popup {
    position: absolute; font-size: 45px; animation: floatUp 2s ease-out forwards;
    pointer-events: none; z-index: 50; text-shadow: 0 4px 10px rgba(0,0,0,0.8);
  }
  @keyframes floatUp {
    0% { opacity: 0; transform: translateY(10px) scale(0.5); }
    20% { opacity: 1; transform: translateY(-15px) scale(1.3); }
    80% { opacity: 1; transform: translateY(-40px) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(0.8); }
  }

  .overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(15, 40, 98, 0.9); backdrop-filter: blur(5px); display: flex;
    justify-content: center; align-items: center; z-index: 100;
  }
  .modal {
    background: var(--panel-bg); padding: 30px; border-radius: 20px;
    text-align: center; max-width: 400px; width: 90%;
    border: 2px solid rgba(255,255,255,0.2); box-shadow: 0 20px 50px rgba(0,0,0,0.8);
  }
  .modal button { margin-top: 25px; width: 100%; }
  
  .lobby-browser {
    background: rgba(0,0,0,0.3) !important;
    border: 2px solid rgba(255,255,255,0.1);
  }
</style>
