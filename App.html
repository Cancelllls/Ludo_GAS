<script>
// @ts-nocheck
/* ============================================================
   LUDO KING – Premium App Logic
   3D Dice · Per-Player Panels · Dark Mode · Premium Rendering
   ============================================================ */

const SafeStorage = {
  getItem(key) {
    try { return localStorage.getItem(key); } catch (e) { return null; }
  },
  setItem(key, value) {
    try { localStorage.setItem(key, value); return true; } catch (e) { return false; }
  },
  removeItem(key) {
    try { localStorage.removeItem(key); return true; } catch (e) { return false; }
  }
};

// ─── Dark Mode Manager ───────────────────────────────────────
const darkModeManager = {
  init() {
    const saved = SafeStorage.getItem('ludoKingDarkMode');
    if (saved === 'true' || (saved === null && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.body.classList.add('dark-mode');
    }
    const toggle = document.getElementById('dark-mode-toggle');
    if (toggle) {
      toggle.addEventListener('click', () => this.toggle());
    }
    this.updateIcon();
  },
  toggle() {
    document.body.classList.toggle('dark-mode');
    const isDark = document.body.classList.contains('dark-mode');
    SafeStorage.setItem('ludoKingDarkMode', isDark);
    this.updateIcon();
    if (gameManager.state) renderer.draw(gameManager.state);
  },
  updateIcon() {
    const toggle = document.getElementById('dark-mode-toggle');
    if (!toggle) return;
    const isDark = document.body.classList.contains('dark-mode');
    toggle.innerHTML = isDark ? '☀️' : '🌙';
    toggle.title = isDark ? 'Switch to Light Mode' : 'Switch to Dark Mode';
  }
};

// ─── Sound Manager ──────────────────────────────────────────
const soundManager = {
  init() {
    const saved = SafeStorage.getItem('ludoKingMuted');
    if (saved === 'true') {
      this.setMuted(true);
    } else {
      this.setMuted(false);
    }
    const toggle = document.getElementById('sound-toggle');
    if (toggle) {
      toggle.addEventListener('click', () => this.toggle());
    }
  },
  toggle() {
    const isCurrentlyMuted = SafeStorage.getItem('ludoKingMuted') === 'true';
    this.setMuted(!isCurrentlyMuted);
  },
  setMuted(mute) {
    SafeStorage.setItem('ludoKingMuted', mute ? 'true' : 'false');
    const icon = document.getElementById('sound-icon');
    if (icon) {
      icon.innerText = mute ? '🔇' : '🔊';
    }
    const toggle = document.getElementById('sound-toggle');
    if (toggle) {
      toggle.title = mute ? 'Unmute Sound' : 'Mute Sound';
    }
  }
};

// ─── Theme Manager ──────────────────────────────────────────
const themeManager = {
  themes: ['classic', 'neon', 'wooden', 'pastel'],
  currentTheme: 'classic',

  init() {
    const saved = SafeStorage.getItem('ludoKingTheme');
    if (this.themes.includes(saved)) {
      this.currentTheme = saved;
    }
    const toggle = document.getElementById('theme-toggle');
    if (toggle) {
      toggle.addEventListener('click', () => this.cycle());
      toggle.title = `Current Theme: ${this.currentTheme.toUpperCase()}`;
    }
  },
  cycle() {
    const idx = this.themes.indexOf(this.currentTheme);
    const nextIdx = (idx + 1) % this.themes.length;
    this.currentTheme = this.themes[nextIdx];
    SafeStorage.setItem('ludoKingTheme', this.currentTheme);
    
    const toggle = document.getElementById('theme-toggle');
    if (toggle) {
      toggle.title = `Current Theme: ${this.currentTheme.toUpperCase()}`;
    }
    
    // Clear offscreen canvas to force redraw of the board with new theme
    if (renderer.offscreenCanvas) {
      renderer.offscreenCanvas.width = 0;
    }
    if (gameManager.state) {
      renderer.draw(gameManager.state);
    }
  }
};

// ─── 3D Dice Controller ──────────────────────────────────────
const dice3DController = {
  // Rotation values for each face result (1-6)
  faceRotations: {
    1: { x: 0,    y: 0   },
    2: { x: 90,   y: 0   },
    3: { x: 0,    y: 90  },
    4: { x: 0,    y: -90 },
    5: { x: -90,  y: 0   },
    6: { x: 180,  y: 0   }
  },

  accumulatedRotations: {
    'red': { x: 0, y: 0 },
    'green': { x: 0, y: 0 },
    'yellow': { x: 0, y: 0 },
    'blue': { x: 0, y: 0 }
  },

  showFace(color, value) {
    const cube = document.querySelector(`#dice-3d-${color} .dice-cube`);
    if (!cube) return;
    const rot = this.faceRotations[value];
    cube.style.transition = 'transform 0.3s ease-out';
    cube.style.transform = `rotateX(${rot.x}deg) rotateY(${rot.y}deg)`;
    this.accumulatedRotations[color] = { x: rot.x, y: rot.y };
  },

  async roll(color, finalValue) {
    const scene = document.querySelector(`#dice-3d-${color} .dice-scene`);
    const cube = document.querySelector(`#dice-3d-${color} .dice-cube`);
    if (!cube) return;

    if (scene) scene.classList.add('is-rolling');

    const targetRot = this.faceRotations[finalValue];
    const currentRot = this.accumulatedRotations[color] || { x: 0, y: 0 };

    // Spin at least 2 full rotations (720 deg) and align final face
    const nextX = Math.ceil(currentRot.x / 360) * 360 + 720 + targetRot.x;
    const nextY = Math.ceil(currentRot.y / 360) * 360 + 720 + targetRot.y;

    this.accumulatedRotations[color] = { x: nextX, y: nextY };

    // Smooth physics-like deceleration gliding to a natural stop
    cube.style.transition = 'transform 0.95s cubic-bezier(0.15, 0.85, 0.3, 1)';
    cube.style.transform = `rotateX(${nextX}deg) rotateY(${nextY}deg)`;

    // Wait for the transition to finish (0.95s)
    await new Promise(r => setTimeout(r, 950));

    if (scene) scene.classList.remove('is-rolling');
  },

  resetAll() {
    ['red', 'green', 'yellow', 'blue'].forEach(color => {
      const cube = document.querySelector(`#dice-3d-${color} .dice-cube`);
      if (cube) {
        cube.style.transition = 'transform 0.3s ease';
        cube.style.transform = 'rotateX(0deg) rotateY(0deg)';
        this.accumulatedRotations[color] = { x: 0, y: 0 };
      }
    });
  },

  setClickable(color, clickable) {
    const panel = document.getElementById(`player-panel-${color}`);
    if (!panel) return;
    const dice = document.querySelector(`#dice-3d-${color}`);
    if (dice) {
      dice.style.cursor = clickable ? 'pointer' : 'default';
      dice.style.opacity = clickable ? '1' : '0.7';
    }
  }
};

// ─── Player Panel Manager ────────────────────────────────────
const panelManager = {
  updatePanels(gameState) {
    if (!gameState || !gameState.players) return;

    const allColors = ['red', 'green', 'yellow', 'blue'];
    const activeColors = gameState.players.map(p => p.color);

    allColors.forEach(color => {
      const panel = document.getElementById(`player-panel-${color}`);
      if (!panel) return;

      const player = gameState.players.find(p => p.color === color);
      if (!player) {
        panel.classList.add('panel-inactive');
        return;
      }

      panel.classList.remove('panel-inactive');

      // Update name
      const nameEl = document.getElementById(`panel-name-${color}`);
      if (nameEl) {
        nameEl.textContent = player.name;
        if (player.isBot) nameEl.textContent += ' 🤖';
      }

      // Update score (tokens home)
      let homeCount = 0;
      for (let i = 0; i < 4; i++) {
        if (gameState.tokens[`${color}_${i}`] && gameState.tokens[`${color}_${i}`].pos === 100) {
          homeCount++;
        }
      }
      const scoreEl = document.getElementById(`panel-score-${color}`);
      if (scoreEl) scoreEl.textContent = `${homeCount}/4`;

      // Active turn glow
      const isActive = gameState.currentColor === color;
      panel.classList.toggle('panel-active', isActive);

      // Clickable dice (only for current player if it's human's turn)
      const isMyTurn = this.isMyDiceTurn(gameState, color);
      dice3DController.setClickable(color, isMyTurn && !gameState.hasRolled && !gameState.winner);
    });
  },

  isMyDiceTurn(gameState, color) {
    if (gameState.currentColor !== color) return false;
    if (AppState.mode === 'local') {
      return !gameState.currentPlayer.isBot;
    } else if (AppState.mode === 'online_playing') {
      return !AppState.isSpectator && gameState.currentPlayer.id === AppState.playerId;
    }
    return false;
  },

  setupDiceClicks() {
    ['red', 'green', 'yellow', 'blue'].forEach(color => {
      const dice = document.querySelector(`#dice-3d-${color}`);
      if (dice) {
        dice.addEventListener('click', () => {
          if (!gameManager.state) return;
          if (gameManager.state.currentColor !== color) return;
          gameManager.rollDice();
        });
      }
    });
  }
};

// ─── UI Manager ──────────────────────────────────────────────
const uiManager = {
  splitCb: null,

  showMainMenu() {
    document.querySelectorAll('.menu-screen').forEach(el => el.classList.add('hidden'));
    document.getElementById('main-menu').classList.remove('hidden');
    document.getElementById('game-screen').classList.add('hidden');
    multiplayerManager.stopLobbyPolling();
    AppState.mode = 'menu';
  },
  showLocalMenu() {
    document.getElementById('main-menu').classList.add('hidden');
    document.getElementById('local-menu').classList.remove('hidden');
  },
  showOnlineMenu() {
    document.getElementById('main-menu').classList.add('hidden');
    document.getElementById('online-menu').classList.remove('hidden');
    multiplayerManager.startLobbyPolling();
  },
  showWaitingRoom(roomCode, players, isHost, spectators) {
    document.querySelectorAll('.menu-screen').forEach(el => el.classList.add('hidden'));
    document.getElementById('waiting-room').classList.remove('hidden');
    document.getElementById('display-room-code').innerText = roomCode;

    const list = document.getElementById('room-players-list');
    list.innerHTML = '';
    players.forEach(p => {
      let item = document.createElement('div');
      item.className = 'player-item';
      let tag = (p.id === AppState.playerId) ? ' (You)' : (p.isBot ? ' [BOT]' : '');
      item.innerHTML = `<span class="color-dot" style="background:${p.color}"></span> ${p.name}${tag}`;
      list.appendChild(item);
    });

    const specList = document.getElementById('room-spectators-list');
    if (spectators && spectators.length > 0) {
      document.getElementById('spectators-list-container').classList.remove('hidden');
      specList.innerText = spectators.join(', ');
    } else {
      document.getElementById('spectators-list-container').classList.add('hidden');
      specList.innerText = '';
    }

    if (isHost && players.length < 4) {
      document.getElementById('host-bot-controls').classList.remove('hidden');
      const claimed = players.map(p => p.color);
      const select = document.getElementById('bot-color-select');
      Array.from(select.options).forEach(opt => {
        opt.disabled = claimed.includes(opt.value);
      });
      if (select.options[select.selectedIndex].disabled) {
        for (let i = 0; i < select.options.length; i++) {
          if (!select.options[i].disabled) {
            select.selectedIndex = i; break;
          }
        }
      }
    } else {
      document.getElementById('host-bot-controls').classList.add('hidden');
    }

    if (isHost && players.length >= 2) {
      document.getElementById('start-online-btn').classList.remove('hidden');
    } else {
      document.getElementById('start-online-btn').classList.add('hidden');
    }
    AppState.mode = 'online_waiting';
  },
  showGame() {
    document.querySelectorAll('.menu-screen').forEach(el => el.classList.add('hidden'));
    document.getElementById('game-screen').classList.remove('hidden');
    if (AppState.isSpectator) {
      const specBadge = document.getElementById('spectator-badge');
      if (specBadge) specBadge.classList.remove('hidden');
    }
    if (AppState.mode === 'online_playing' && !AppState.isSpectator) {
      const emojiPanel = document.getElementById('emoji-panel');
      if (emojiPanel) emojiPanel.classList.remove('hidden');
    } else {
      const emojiPanel = document.getElementById('emoji-panel');
      if (emojiPanel) emojiPanel.classList.add('hidden');
    }
    setTimeout(() => renderer.resize(), 50);
  },
  updateGameUI(gameState) {
    const color = gameState.currentColor;
    const p = gameState.currentPlayer;

    // Update turn indicator
    const box = document.getElementById('turn-indicator');
    if (box) {
      box.innerText = `${p.name}'s Turn`;
      box.style.color = 'white';
      const colorHex = { 'red': '#E53935', 'blue': '#1E88E5', 'green': '#43A047', 'yellow': '#FDD835' }[color];
      box.style.backgroundColor = colorHex;
      if (color === 'yellow') box.style.color = '#333';
    }

    // Update action status
    const status = document.getElementById('action-status');
    // Also update the hidden legacy dice-value for backward compat
    const diceVal = document.getElementById('dice-value');

    if (gameState.lastAction && gameState.lastAction.includes('3 Sixes')) {
      if (status) status.innerText = gameState.lastAction;
      if (diceVal) diceVal.innerText = '🎲';
    } else if (gameState.hasRolled) {
      if (diceVal) diceVal.innerText = gameState.diceRoll;
      if (gameState.winner) {
        if (status) status.innerText = `🏆 ${gameState.winner.toUpperCase()} WINS! 🏆`;
      } else {
        const valid = gameState.getValidMoves(color, gameState.diceRoll);
        if (valid.length === 0) {
          if (status) status.innerText = 'No valid moves.';
        } else {
          if (status) {
            status.innerText = AppState.isSpectator ? 'Waiting for move...' :
              (gameState.settings.splitMoves ? `Select token (Points left: ${gameState.remainingRoll})` : 'Select a token to move.');
          }
        }
      }
    } else {
      if (diceVal) diceVal.innerText = '🎲';
      if (status) {
        status.innerText = p.isBot ? '🤖 Bot is thinking...' :
          (AppState.isSpectator ? 'Waiting for roll...' : `🎲 ${p.name}, roll the dice!`);
      }
    }

    // Update player panels
    panelManager.updatePanels(gameState);

    // Blitz timer logic
    if (gameState.settings && gameState.settings.blitz && !gameState.winner) {
      let isMyTurn = false;
      if (AppState.mode === 'online_playing' && !AppState.isSpectator && gameState.currentPlayer.id === AppState.playerId) isMyTurn = true;
      if (AppState.mode === 'local' && !gameState.currentPlayer.isBot) isMyTurn = true;

      if (isMyTurn) {
        let actionKey = gameState.turnCount + '_' + gameState.hasRolled;
        gameManager.startBlitzTimer(actionKey);
      } else {
        gameManager.stopBlitzTimer();
      }
    } else {
      gameManager.stopBlitzTimer();
    }
  },
  showModal(title, msg) {
    document.getElementById('modal-title').innerText = title;
    document.getElementById('modal-content').innerText = msg;
    document.getElementById('overlay').classList.remove('hidden');

    // Trigger celebration effect for winners
    if (title === 'Game Over') {
      this.triggerCelebration();
    }
  },
  closeModal() {
    document.getElementById('overlay').classList.add('hidden');
    this.stopCelebration();
  },
  showSplitModal(maxSteps, cb) {
    this.splitCb = cb;
    document.getElementById('split-points-left').innerText = maxSteps;
    const range = document.getElementById('split-range');
    range.max = maxSteps;
    range.value = maxSteps;
    document.getElementById('split-range-val').innerText = maxSteps;
    range.oninput = () => {
      document.getElementById('split-range-val').innerText = range.value;
    };
    document.getElementById('split-overlay').classList.remove('hidden');
  },
  confirmSplit() {
    const val = parseInt(document.getElementById('split-range').value);
    document.getElementById('split-overlay').classList.add('hidden');
    if (this.splitCb) this.splitCb(val);
  },
  cancelSplit() {
    document.getElementById('split-overlay').classList.add('hidden');
    if (this.splitCb) this.splitCb(0);
  },

  // Celebration confetti
  celebrationInterval: null,
  triggerCelebration() {
    const container = document.getElementById('celebration-container');
    if (!container) return;
    container.classList.remove('hidden');

    const colors = ['#E53935', '#1E88E5', '#43A047', '#FDD835', '#FFD700', '#FF6B6B', '#4ECDC4'];
    this.celebrationInterval = setInterval(() => {
      for (let i = 0; i < 5; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti-piece';
        confetti.style.left = Math.random() * 100 + '%';
        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
        confetti.style.animationDelay = Math.random() * 0.5 + 's';
        container.appendChild(confetti);
        setTimeout(() => confetti.remove(), 4000);
      }
    }, 200);
  },
  stopCelebration() {
    if (this.celebrationInterval) {
      clearInterval(this.celebrationInterval);
      this.celebrationInterval = null;
    }
    const container = document.getElementById('celebration-container');
    if (container) {
      container.classList.add('hidden');
      container.innerHTML = '';
    }
  },
  toggleQuickChat() {
    const popover = document.getElementById('quick-chat-popover');
    if (popover) popover.classList.toggle('hidden');
  },
  sendQuickChat(phrase) {
    this.toggleQuickChat();
    multiplayerManager.sendReaction(phrase);
  }
};

// ─── Premium Board Renderer ─────────────────────────────────
const renderer = {
  canvas: null,
  ctx: null,
  size: 0,
  cs: 0,

  bases: {
    'red': { x: 3.0, y: 3.0 },
    'green': { x: 12.0, y: 3.0 },
    'yellow': { x: 12.0, y: 12.0 },
    'blue': { x: 3.0, y: 12.0 }
  },

  cells: [],
  homeCells: { 'red': [], 'blue': [], 'green': [], 'yellow': [] },

  visualTokens: null,
  animLooping: false,

  init() {
    this.canvas = document.getElementById('ludo-board');
    this.ctx = this.canvas.getContext('2d');
    this.buildTrackCoords();
    this.resize(); // Initialize sizes and fallback immediately on load!
    window.addEventListener('resize', () => this.resize());
    this.canvas.addEventListener('click', (e) => this.handleClick(e));
    panelManager.setupDiceClicks();
  },

  resize() {
    // Determine the actual CSS physical size of the canvas element
    const container = document.querySelector('.board-area');
    const rect = container ? container.getBoundingClientRect() : { width: 0, height: 0 };
    
    // We render a perfect square. If DOM fails or is hidden, fallback to a reasonable estimate.
    let physicalSize = Math.min(rect.width, rect.height);
    if (physicalSize < 100) physicalSize = Math.min(window.innerWidth - 480, window.innerHeight - 100);
    if (physicalSize < 100) physicalSize = 800; // ultimate fallback
    
    // Fix blurriness: match internal resolution to physical CSS pixels * device pixel ratio!
    const dpr = window.devicePixelRatio || 1;
    this.size = Math.floor(physicalSize * dpr);
    
    if (this.canvas) {
      this.canvas.width = this.size;
      this.canvas.height = this.size;
    }
    
    this.cs = this.size / 15; // 15x15 Ludo grid
    
    if (gameManager.state) this.draw(gameManager.state);
  },

  buildTrackCoords() {
    const pushP = (x, y) => this.cells.push({ x, y });
    pushP(1, 6); pushP(2, 6); pushP(3, 6); pushP(4, 6); pushP(5, 6);
    pushP(6, 5); pushP(6, 4); pushP(6, 3); pushP(6, 2); pushP(6, 1); pushP(6, 0);
    pushP(7, 0); pushP(8, 0);
    pushP(8, 1); pushP(8, 2); pushP(8, 3); pushP(8, 4); pushP(8, 5);
    pushP(9, 6); pushP(10, 6); pushP(11, 6); pushP(12, 6); pushP(13, 6); pushP(14, 6);
    pushP(14, 7); pushP(14, 8);
    pushP(13, 8); pushP(12, 8); pushP(11, 8); pushP(10, 8); pushP(9, 8);
    pushP(8, 9); pushP(8, 10); pushP(8, 11); pushP(8, 12); pushP(8, 13); pushP(8, 14);
    pushP(7, 14); pushP(6, 14);
    pushP(6, 13); pushP(6, 12); pushP(6, 11); pushP(6, 10); pushP(6, 9);
    pushP(5, 8); pushP(4, 8); pushP(3, 8); pushP(2, 8); pushP(1, 8); pushP(0, 8);
    pushP(0, 7); pushP(0, 6);

    for (let i = 1; i <= 5; i++) this.homeCells['red'].push({ x: i, y: 7 });
    for (let i = 1; i <= 5; i++) this.homeCells['green'].push({ x: 7, y: i });
    for (let i = 1; i <= 5; i++) this.homeCells['yellow'].push({ x: 14 - i, y: 7 });
    for (let i = 1; i <= 5; i++) this.homeCells['blue'].push({ x: 7, y: 14 - i });
  },

  getPathSequence(color, startPos, endPos) {
    let seq = [];
    if (startPos === -1) {
      seq.push(LudoEngine.PATH_OFFSETS[color]);
      startPos = LudoEngine.PATH_OFFSETS[color];
    }
    let curr = startPos;
    while (curr !== endPos && curr >= 0) {
      if (curr >= 0 && curr <= 51) {
        let relStart = LudoEngine.PATH_OFFSETS[color];
        let traveled = (curr >= relStart) ? (curr - relStart) : (52 - relStart + curr);
        if (traveled === 50) {
          curr = LudoEngine.HOME_PATH_START[color];
        } else {
          curr = (curr + 1) % 52;
        }
      } else if (curr >= 52 && curr <= 71) {
        curr++;
      } else {
        break;
      }
      if (curr === 101) curr = 100;
      seq.push(curr);
    }
    return seq;
  },

  getCoords(color, pos, isResting = false, restingCount = 1, restingIdx = 0) {
    let cs = this.cs;
    let cx, cy;
    if (pos === -1) {
      let baseC = this.bases[color];
      let offsets = [{ dx: -1, dy: -1 }, { dx: 1, dy: -1 }, { dx: -1, dy: 1 }, { dx: 1, dy: 1 }];
      let bo = offsets[restingIdx % 4] || offsets[0];
      cx = (baseC.x + bo.dx * 0.75) * cs;
      cy = (baseC.y + bo.dy * 0.75) * cs;
    } else if (pos >= 0 && pos <= 51) {
      cx = (this.cells[pos].x + 0.5) * cs;
      cy = (this.cells[pos].y + 0.5) * cs;
    } else if (pos >= 52 && pos <= 71) {
      let col = 'red'; let idx = pos - 52;
      if (pos >= 57 && pos <= 61) { col = 'green'; idx = pos - 57; }
      else if (pos >= 62 && pos <= 66) { col = 'yellow'; idx = pos - 62; }
      else if (pos >= 67 && pos <= 71) { col = 'blue'; idx = pos - 67; }
      cx = (this.homeCells[col][idx].x + 0.5) * cs;
      cy = (this.homeCells[col][idx].y + 0.5) * cs;
    } else if (pos === 100) {
      cx = 7.5 * cs; cy = 7.5 * cs;
    }

    if (isResting && restingCount > 1 && pos !== -1 && pos !== 100) {
      let angle = (Math.PI * 2 / restingCount) * restingIdx;
      let radius = cs * 0.25;
      cx += Math.cos(angle) * radius;
      cy += Math.sin(angle) * radius;
    }

    return { x: cx, y: cy };
  },

  getBoardColors() {
    const theme = typeof themeManager !== 'undefined' ? themeManager.currentTheme : 'classic';
    if (theme === 'neon') {
      return {
        red: '#FF007F',      // Neon Pink
        blue: '#9D00FF',     // Synthwave Purple
        green: '#00FFFF',    // Cyber Cyan
        yellow: '#FF9F00',   // Neon Orange
        redDark: '#C0005A',
        blueDark: '#7000B3',
        greenDark: '#00B3B3',
        yellowDark: '#D87B00',
        redLight: '#FF3399',
        blueLight: '#B233FF',
        greenLight: '#33FFFF',
        yellowLight: '#FFB333',
        boardBg: '#0A0416',
        cellBg: '#170F2C',
        cellBorder: 'rgba(74, 53, 117, 0.4)',
        centerBg: '#1B1135',
        starBg: '#382060',
        text: '#E2D9F3',
        shadow: 'rgba(0,0,0,0.5)'
      };
    } else if (theme === 'wooden') {
      return {
        red: '#B2533E',      // Terracotta Red
        blue: '#4F709C',     // Slate Blue
        green: '#5C8374',    // Sage Green
        yellow: '#DFD3C3',   // Sand/Beige
        redDark: '#8E3E2F',
        blueDark: '#213555',
        greenDark: '#456255',
        yellowDark: '#B5A595',
        redLight: '#C37361',
        blueLight: '#728FBA',
        greenLight: '#7E9F92',
        yellowLight: '#EBE4C9',
        boardBg: '#F3EEEA',
        cellBg: '#EBE3D5',
        cellBorder: 'rgba(176, 166, 149, 0.4)',
        centerBg: '#DFD3C3',
        starBg: '#D0C0B0',
        text: '#3A2E2B',
        shadow: 'rgba(0,0,0,0.15)'
      };
    } else if (theme === 'pastel') {
      return {
        red: '#FFB7B2',      // Soft Coral
        blue: '#C7CEEA',     // Pastel Blue
        green: '#B5EAD7',    // Mint Green
        yellow: '#FFF9A6',   // Soft Lemon
        redDark: '#FF8B85',
        blueDark: '#A4B2E6',
        greenDark: '#8AE0C2',
        yellowDark: '#FFE57F',
        redLight: '#FFD1CF',
        blueLight: '#E2E6F6',
        greenLight: '#D6F5EB',
        yellowLight: '#FFFBD0',
        boardBg: '#FAF8F5',
        cellBg: '#FFFFFF',
        cellBorder: 'rgba(224, 220, 211, 0.5)',
        centerBg: '#F5F3ED',
        starBg: '#ECEAE4',
        text: '#4A4A4A',
        shadow: 'rgba(0,0,0,0.08)'
      };
    }
    
    // Default: 'classic'
    return {
      red: '#F44336',
      blue: '#2196F3',
      green: '#4CAF50',
      yellow: '#FFEB3B',
      redDark: '#D32F2F',
      blueDark: '#1976D2',
      greenDark: '#388E3C',
      yellowDark: '#FBC02D',
      redLight: '#FF5252',
      blueLight: '#42A5F5',
      greenLight: '#66BB6A',
      yellowLight: '#FFEE58',
      boardBg: '#FFFFFF',
      cellBg: '#FFFFFF',
      cellBorder: 'rgba(0,0,0,0.09)',
      centerBg: '#F5F5F5',
      starBg: '#E8E8E8',
      text: '#333333',
      shadow: 'rgba(0,0,0,0.2)'
    };
  },

  drawStaticBoardTo(ctx) {
    const cs = this.cs;
    const c = this.getBoardColors();
    const theme = typeof themeManager !== 'undefined' ? themeManager.currentTheme : 'classic';
    ctx.clearRect(0, 0, this.size, this.size);

    // ─── Base Quadrants (with gradient fills & 3D borders) ────────
    const draw3DQuadrant = (x, y, w, h, baseColor, lightColor) => {
      const grad = ctx.createLinearGradient(x, y, x + w, y + h);
      grad.addColorStop(0, baseColor);
      grad.addColorStop(1, lightColor);
      ctx.fillStyle = grad;
      ctx.fillRect(x, y, w, h);

      // Dark bottom-right border for 3D depth
      ctx.strokeStyle = 'rgba(0,0,0,0.25)';
      ctx.lineWidth = cs * 0.08;
      ctx.beginPath();
      ctx.moveTo(x, y + h);
      ctx.lineTo(x + w, y + h);
      ctx.lineTo(x + w, y);
      ctx.stroke();

      // Light top-left border for 3D highlight
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.moveTo(x, y + h);
      ctx.lineTo(x, y);
      ctx.lineTo(x + w, y);
      ctx.stroke();
    };

    draw3DQuadrant(0, 0, cs * 6, cs * 6, c.red, c.redLight);
    draw3DQuadrant(cs * 9, 0, cs * 6, cs * 6, c.green, c.greenLight);
    draw3DQuadrant(cs * 9, cs * 9, cs * 6, cs * 6, c.yellow, c.yellowLight);
    draw3DQuadrant(0, cs * 9, cs * 6, cs * 6, c.blue, c.blueLight);

    // ─── Base inner white area with shadow ────────
    ctx.shadowColor = c.shadow;
    ctx.shadowBlur = 12;
    ctx.shadowOffsetY = 4;
    ctx.fillStyle = c.cellBg;

    const drawRoundedRect = (x, y, w, h, r) => {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      ctx.fill();
    };

    drawRoundedRect(cs * 0.8, cs * 0.8, cs * 4.4, cs * 4.4, cs * 0.4);
    drawRoundedRect(cs * 9.8, cs * 0.8, cs * 4.4, cs * 4.4, cs * 0.4);
    drawRoundedRect(cs * 9.8, cs * 9.8, cs * 4.4, cs * 4.4, cs * 0.4);
    drawRoundedRect(cs * 0.8, cs * 9.8, cs * 4.4, cs * 4.4, cs * 0.4);

    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;

    // Draw base token cups (3D recessed holes)
    const baseTokenPositions = {
      'red': [{ x: 2.25, y: 2.25 }, { x: 3.75, y: 2.25 }, { x: 2.25, y: 3.75 }, { x: 3.75, y: 3.75 }],
      'green': [{ x: 11.25, y: 2.25 }, { x: 12.75, y: 2.25 }, { x: 11.25, y: 3.75 }, { x: 12.75, y: 3.75 }],
      'yellow': [{ x: 11.25, y: 11.25 }, { x: 12.75, y: 11.25 }, { x: 11.25, y: 12.75 }, { x: 12.75, y: 12.75 }],
      'blue': [{ x: 2.25, y: 11.25 }, { x: 3.75, y: 11.25 }, { x: 2.25, y: 12.75 }, { x: 3.75, y: 12.75 }]
    };

    for (let col in baseTokenPositions) {
      baseTokenPositions[col].forEach(pos => {
        // Draw cup bottom
        ctx.beginPath();
        ctx.arc(pos.x * cs, pos.y * cs, cs * 0.38, 0, Math.PI * 2);
        ctx.fillStyle = theme === 'neon' ? '#170F2C' : '#EAEAEA';
        ctx.fill();

        // Inner shadow to represent physical depth
        let cupGrad = ctx.createRadialGradient(pos.x * cs, pos.y * cs, cs * 0.2, pos.x * cs, pos.y * cs, cs * 0.38);
        cupGrad.addColorStop(0, 'rgba(0,0,0,0)');
        cupGrad.addColorStop(1, 'rgba(0,0,0,0.12)');
        ctx.fillStyle = cupGrad;
        ctx.fill();

        // Outer border line
        ctx.strokeStyle = c[col];
        ctx.lineWidth = 2.2;
        ctx.stroke();
      });
    }

    // ─── Center Home Triangle ────────
    const triangles = [
      { points: [[6, 6], [9, 6], [7.5, 7.5]], color: c.green },
      { points: [[9, 6], [9, 9], [7.5, 7.5]], color: c.yellow },
      { points: [[9, 9], [6, 9], [7.5, 7.5]], color: c.blue },
      { points: [[6, 9], [6, 6], [7.5, 7.5]], color: c.red }
    ];

    triangles.forEach(t => {
      ctx.beginPath();
      ctx.moveTo(t.points[0][0] * cs, t.points[0][1] * cs);
      ctx.lineTo(t.points[1][0] * cs, t.points[1][1] * cs);
      ctx.lineTo(t.points[2][0] * cs, t.points[2][1] * cs);
      ctx.closePath();
      
      // Sloped 3D gradient darkening towards center
      let grad = ctx.createLinearGradient(t.points[0][0] * cs, t.points[0][1] * cs, t.points[2][0] * cs, t.points[2][1] * cs);
      grad.addColorStop(0, t.color);
      grad.addColorStop(1, 'rgba(0,0,0,0.18)');
      ctx.fillStyle = grad;
      ctx.fill();

      ctx.strokeStyle = 'rgba(255,255,255,0.4)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    });

    // Center home star
    ctx.font = `${cs * 0.6}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.fillText('🏠', 7.5 * cs, 7.5 * cs);

    // ─── Track Cells (with 3D Tile Beveling) ────────
    for (let cell of this.cells) {
      // Base cell gradient
      let cellGrad = ctx.createLinearGradient(cell.x * cs, cell.y * cs, (cell.x + 1) * cs, (cell.y + 1) * cs);
      cellGrad.addColorStop(0, c.cellBg);
      cellGrad.addColorStop(1, c.centerBg || c.cellBg);
      ctx.fillStyle = cellGrad;
      ctx.fillRect(cell.x * cs, cell.y * cs, cs, cs);

      // Soft boundary
      ctx.strokeStyle = c.cellBorder;
      ctx.lineWidth = 1;
      ctx.strokeRect(cell.x * cs, cell.y * cs, cs, cs);

      // Bevel Highlights (raised edges)
      ctx.strokeStyle = theme === 'neon' ? 'rgba(255, 255, 255, 0.15)' : 'rgba(255, 255, 255, 0.95)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(cell.x * cs + 0.5, cell.y * cs + cs - 0.5);
      ctx.lineTo(cell.x * cs + 0.5, cell.y * cs + 0.5);
      ctx.lineTo(cell.x * cs + cs - 0.5, cell.y * cs + 0.5);
      ctx.stroke();
    }

    // ─── Home Path Cells (colored with 3D bevels) ────────
    for (let col in this.homeCells) {
      for (let cell of this.homeCells[col]) {
        const grad = ctx.createLinearGradient(cell.x * cs, cell.y * cs, cell.x * cs + cs, cell.y * cs + cs);
        grad.addColorStop(0, c[col]);
        grad.addColorStop(1, c[col + 'Dark'] || c[col]);
        ctx.fillStyle = grad;
        ctx.fillRect(cell.x * cs, cell.y * cs, cs, cs);

        // Dark bevel borders
        ctx.strokeStyle = 'rgba(0,0,0,0.18)';
        ctx.lineWidth = 1;
        ctx.strokeRect(cell.x * cs, cell.y * cs, cs, cs);

        // Light bevel highlights
        ctx.strokeStyle = 'rgba(255,255,255,0.45)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(cell.x * cs + 0.5, cell.y * cs + cs - 0.5);
        ctx.lineTo(cell.x * cs + 0.5, cell.y * cs + 0.5);
        ctx.lineTo(cell.x * cs + cs - 0.5, cell.y * cs + 0.5);
        ctx.stroke();
      }
    }

    // ─── Safe / Star Zones (3D tiles) ────────
    for (let i of LudoEngine.STAR_ZONES) {
      let cell = this.cells[i];
      let safeCol = c.starBg;
      let safeColLight = c.boardBg;
      if (i === 0) { safeCol = c.red; safeColLight = c.redLight; }
      else if (i === 13) { safeCol = c.green; safeColLight = c.greenLight; }
      else if (i === 26) { safeCol = c.yellow; safeColLight = c.yellowLight; }
      else if (i === 39) { safeCol = c.blue; safeColLight = c.blueLight; }

      let cellGrad = ctx.createLinearGradient(cell.x * cs, cell.y * cs, (cell.x + 1) * cs, (cell.y + 1) * cs);
      cellGrad.addColorStop(0, safeColLight);
      cellGrad.addColorStop(1, safeCol);
      ctx.fillStyle = cellGrad;
      ctx.fillRect(cell.x * cs, cell.y * cs, cs, cs);

      ctx.strokeStyle = 'rgba(0,0,0,0.12)';
      ctx.lineWidth = 1;
      ctx.strokeRect(cell.x * cs, cell.y * cs, cs, cs);

      // Light bevel highlights
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(cell.x * cs + 0.5, cell.y * cs + cs - 0.5);
      ctx.lineTo(cell.x * cs + 0.5, cell.y * cs + 0.5);
      ctx.lineTo(cell.x * cs + cs - 0.5, cell.y * cs + 0.5);
      ctx.stroke();

      // Draw star shape with shadow
      ctx.save();
      ctx.shadowColor = 'rgba(0, 0, 0, 0.22)';
      ctx.shadowBlur = 4;
      ctx.shadowOffsetY = 1;
      this.drawStar(ctx, cell.x * cs + cs * 0.5, cell.y * cs + cs * 0.5, 5, cs * 0.25, cs * 0.12,
        (i === 0 || i === 13 || i === 26 || i === 39) ? 'rgba(255,255,255,0.8)' : 'rgba(0,0,0,0.15)');
      ctx.restore();
    }

    // Starting arrows on colored safe zones
    const startArrows = [
      { pos: 0, dir: 'right', color: c.red },
      { pos: 13, dir: 'down', color: c.green },
      { pos: 26, dir: 'left', color: c.yellow },
      { pos: 39, dir: 'up', color: c.blue }
    ];

    startArrows.forEach(a => {
      const cell = this.cells[a.pos];
      ctx.font = `bold ${cs * 0.35}px Inter`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      const arrows = { right: '▶', up: '▲', left: '◀', down: '▼' };
      ctx.fillText(arrows[a.dir], cell.x * cs + cs * 0.5, cell.y * cs + cs * 0.5);
    });
  },

  drawBoard() {
    if (!this.offscreenCanvas) {
      this.offscreenCanvas = document.createElement('canvas');
      this.offscreenCtx = this.offscreenCanvas.getContext('2d');
    }
    
    // Auto-update offscreen canvas size and cache board pixels when canvas size changes
    if (this.offscreenCanvas.width !== this.size || this.offscreenCanvas.height !== this.size) {
      this.offscreenCanvas.width = this.size;
      this.offscreenCanvas.height = this.size;
      this.drawStaticBoardTo(this.offscreenCtx);
    }
    
    // Single lightning-fast bitwise image transfer from offscreen cache!
    this.ctx.clearRect(0, 0, this.size, this.size);
    this.ctx.drawImage(this.offscreenCanvas, 0, 0);
    
    // Draw dynamic bounties on top of cached background
    this.drawBounties();
  },

  drawBounties() {
    const ctx = this.ctx;
    const cs = this.cs;
    if (gameManager.state && gameManager.state.settings && gameManager.state.bounties) {
      gameManager.state.bounties.forEach(b => {
        let bc = this.getCoords('red', b.pos);
        ctx.font = `${cs * 0.5}px Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = "rgba(0,0,0,0.5)";
        ctx.shadowBlur = 5;
        ctx.fillText(b.type === 'shield' ? '🛡️' : '✨', bc.x, bc.y);
        ctx.shadowBlur = 0;
      });
    }
  },

  drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius, color) {
    let rot = Math.PI / 2 * 3;
    let x = cx;
    let y = cy;
    let step = Math.PI / spikes;

    ctx.beginPath();
    ctx.moveTo(cx, cy - outerRadius);
    for (let i = 0; i < spikes; i++) {
      x = cx + Math.cos(rot) * outerRadius;
      y = cy + Math.sin(rot) * outerRadius;
      ctx.lineTo(x, y);
      rot += step;
      x = cx + Math.cos(rot) * innerRadius;
      y = cy + Math.sin(rot) * innerRadius;
      ctx.lineTo(x, y);
      rot += step;
    }
    ctx.lineTo(cx, cy - outerRadius);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
  },

  drawVisualTokens() {
    if (!this.visualTokens) return;
    const c = this.getBoardColors();
    const colors = { 'red': c.red, 'blue': c.blue, 'green': c.green, 'yellow': c.yellow };
    const darkColors = { 'red': c.redDark, 'blue': c.blueDark, 'green': c.greenDark, 'yellow': c.yellowDark };
    const ctx = this.ctx;
    const cs = this.cs;

    const validMoves = (gameManager.state && gameManager.state.hasRolled && !gameManager.state.winner)
      ? gameManager.state.getValidMoves(gameManager.state.currentColor, gameManager.state.diceRoll)
      : [];
    const isMyTurn = AppState.mode === 'local'
      ? (gameManager.state && !gameManager.state.currentPlayer.isBot)
      : (gameManager.state && gameManager.state.currentPlayer.id === AppState.playerId && !AppState.isSpectator);

    let time = Date.now();
    let pulse = (Math.sin(time / 150) + 1) / 2;

    for (let k in this.visualTokens) {
      let vt = this.visualTokens[k];
      let color = k.split('_')[0];
      let size = cs * 0.36;

      let tLogical = gameManager.state ? gameManager.state.tokens[k] : null;
      let isValid = isMyTurn && validMoves.includes(k);

      // Pulse glow for valid moves
      if (isValid) {
        ctx.beginPath();
        ctx.arc(vt.x, vt.y, size + 6 + (pulse * 6), 0, Math.PI * 2);
        let gradPulse = ctx.createRadialGradient(vt.x, vt.y, size, vt.x, vt.y, size + 12);
        gradPulse.addColorStop(0, `rgba(255, 215, 0, ${0.5 + pulse * 0.3})`);
        gradPulse.addColorStop(1, 'rgba(255, 215, 0, 0)');
        ctx.fillStyle = gradPulse;
        ctx.fill();
      }

      // ─── Premium 3D Stand-up Pawn Rendering ────────
      
      // 1. Cast shadow (offset bottom right and blurred)
      ctx.beginPath();
      ctx.ellipse(vt.x + size * 0.2, vt.y + size * 0.35, size * 0.95, size * 0.45, 0, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(0, 0, 0, 0.28)";
      ctx.fill();

      // 2. Token Base (Elliptical base rim)
      ctx.beginPath();
      ctx.ellipse(vt.x, vt.y + size * 0.25, size * 0.85, size * 0.4, 0, 0, Math.PI * 2);
      let baseGrad = ctx.createLinearGradient(vt.x - size, vt.y, vt.x + size, vt.y + size * 0.5);
      baseGrad.addColorStop(0, darkColors[color]);
      baseGrad.addColorStop(0.5, colors[color]);
      baseGrad.addColorStop(1, darkColors[color]);
      ctx.fillStyle = baseGrad;
      ctx.fill();
      ctx.strokeStyle = "rgba(0,0,0,0.3)";
      ctx.lineWidth = 1;
      ctx.stroke();

      // 3. Pawn Stem/Body (Conical tapered waist connecting base to head)
      ctx.beginPath();
      ctx.moveTo(vt.x - size * 0.45, vt.y + size * 0.15);
      ctx.bezierCurveTo(vt.x - size * 0.35, vt.y - size * 0.2, vt.x - size * 0.28, vt.y - size * 0.4, vt.x - size * 0.2, vt.y - size * 0.5);
      ctx.lineTo(vt.x + size * 0.2, vt.y - size * 0.5);
      ctx.bezierCurveTo(vt.x + size * 0.28, vt.y - size * 0.4, vt.x + size * 0.35, vt.y - size * 0.2, vt.x + size * 0.45, vt.y + size * 0.15);
      ctx.closePath();
      let bodyGrad = ctx.createLinearGradient(vt.x - size * 0.5, vt.y - size * 0.5, vt.x + size * 0.5, vt.y + size * 0.15);
      bodyGrad.addColorStop(0, colors[color]);
      bodyGrad.addColorStop(1, darkColors[color]);
      ctx.fillStyle = bodyGrad;
      ctx.fill();
      ctx.strokeStyle = "rgba(0,0,0,0.25)";
      ctx.stroke();

      // 4. Pawn Head (Spherical ball resting on top of the stem)
      let headY = vt.y - size * 0.6;
      let headR = size * 0.6;
      ctx.beginPath();
      ctx.arc(vt.x, headY, headR, 0, Math.PI * 2);
      let headGrad = ctx.createRadialGradient(vt.x - headR * 0.3, headY - headR * 0.3, headR * 0.1, vt.x, headY, headR);
      headGrad.addColorStop(0, '#FFFFFF'); // Specular light highlight source
      headGrad.addColorStop(0.3, colors[color]);
      headGrad.addColorStop(1, darkColors[color]);
      ctx.fillStyle = headGrad;
      ctx.fill();
      ctx.strokeStyle = "rgba(0,0,0,0.3)";
      ctx.stroke();

      // 5. Glossy reflection/specular shine on the body/stem
      ctx.beginPath();
      ctx.ellipse(vt.x - size * 0.1, vt.y - size * 0.15, size * 0.12, size * 0.22, Math.PI / 12, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.28)';
      ctx.fill();

      // Shield effect
      if (tLogical && tLogical.shield) {
        ctx.beginPath();
        ctx.arc(vt.x, vt.y, size + 5, 0, Math.PI * 2);
        ctx.strokeStyle = '#00E5FF';
        ctx.lineWidth = 3;
        ctx.shadowColor = '#00E5FF';
        ctx.shadowBlur = 10;
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
    }
  },

  syncVisuals(state) {
    if (!this.visualTokens) {
      this.visualTokens = {};
      for (let k in state.tokens) {
        this.visualTokens[k] = { logicalPos: state.tokens[k].pos, x: 0, y: 0, animating: false, queue: [] };
        let coords = this.getCoords(state.tokens[k].color, state.tokens[k].pos, true, 4, parseInt(k.split('_')[1]));
        this.visualTokens[k].x = coords.x || 0;
        this.visualTokens[k].y = coords.y || 0;
      }
    }

    let restGroups = {};
    for (let k in state.tokens) {
      let p = state.tokens[k].pos;
      if (!restGroups[p]) restGroups[p] = [];
      restGroups[p].push(k);
    }

    for (let k in state.tokens) {
      let t = state.tokens[k];
      let vt = this.visualTokens[k];

      if (t.pos !== vt.logicalPos && !vt.animating && vt.queue.length === 0) {
        if (t.pos === -1 || t.pos === 100) {
          vt.queue.push({ pos: t.pos });
        } else {
          let seq = this.getPathSequence(t.color, vt.logicalPos, t.pos);
          seq.forEach(p => vt.queue.push({ pos: p }));
        }
        vt.logicalPos = t.pos;
      }

      if (vt.queue.length === 0) {
        let group = restGroups[t.pos];
        if (t.pos === -1) {
          vt.targetCoords = this.getCoords(t.color, t.pos, true, 4, parseInt(k.split('_')[1]));
        } else {
          let idx = group.indexOf(k);
          vt.targetCoords = this.getCoords(t.color, t.pos, true, group.length, idx);
        }
        // Snap immediately if not animating, avoiding sliding during resizes or initial loads
        if (!vt.animating) {
          vt.x = vt.targetCoords.x;
          vt.y = vt.targetCoords.y;
        }
      } else {
        vt.targetCoords = this.getCoords(t.color, vt.queue[0].pos, false, 1, 0);
      }
    }

    if (!this.animLooping) {
      this.animLooping = true;
      requestAnimationFrame(() => this.renderLoop());
    }
  },

  renderLoop() {
    let animatingAny = false;
    const speed = 0.25;

    const validMoves = (gameManager.state && gameManager.state.hasRolled && !gameManager.state.winner)
      ? gameManager.state.getValidMoves(gameManager.state.currentColor, gameManager.state.diceRoll)
      : [];
    const isMyTurn = AppState.mode === 'local'
      ? (gameManager.state && !gameManager.state.currentPlayer.isBot)
      : (gameManager.state && gameManager.state.currentPlayer.id === AppState.playerId && !AppState.isSpectator);

    if (isMyTurn && validMoves.length > 0) animatingAny = true;

    for (let k in this.visualTokens) {
      let vt = this.visualTokens[k];
      let dx = vt.targetCoords.x - vt.x;
      let dy = vt.targetCoords.y - vt.y;
      let dist = Math.sqrt(dx * dx + dy * dy);

      if (dist > 1) {
        animatingAny = true;
        vt.animating = true;
        vt.x += dx * speed;
        vt.y += dy * speed;
      } else {
        vt.x = vt.targetCoords.x;
        vt.y = vt.targetCoords.y;
        if (vt.queue.length > 0) {
          vt.queue.shift();
          if (vt.queue.length > 0) {
            vt.targetCoords = this.getCoords(k.split('_')[0], vt.queue[0].pos, false, 1, 0);
            animatingAny = true;
            vt.animating = true;
          } else {
            vt.animating = false;
            this.syncVisuals(gameManager.state);
          }
        } else {
          vt.animating = false;
        }
      }
    }

    this.drawBoard();
    this.drawVisualTokens();

    if (animatingAny) {
      requestAnimationFrame(() => this.renderLoop());
    } else {
      this.animLooping = false;
    }
  },

  draw(gameState) {
    if (!gameState) return;
    if (!this.cs || isNaN(this.cs) || this.cs === 0) {
      this.resize();
    }
    this.syncVisuals(gameState);
  },

  handleClick(e) {
    if (AppState.mode !== 'local' && AppState.mode !== 'online_playing') return;
    const s = gameManager.state;
    if (!s || !s.hasRolled || s.winner) return;

    if (AppState.mode === 'online_playing') {
      if (AppState.isSpectator || s.currentPlayer.id !== AppState.playerId) return;
    } else {
      if (s.currentPlayer.isBot) return;
    }

    const rect = this.canvas.getBoundingClientRect();
    const renderSize = Math.min(rect.width, rect.height);
    const offsetX = (rect.width - renderSize) / 2;
    const offsetY = (rect.height - renderSize) / 2;
    
    const x = e.clientX - rect.left - offsetX;
    const y = e.clientY - rect.top - offsetY;

    if (x < 0 || y < 0 || x > renderSize || y > renderSize) return; // Clicked outside the actual board area
    
    // Now we scale by the DPR (device pixel ratio) because canvas.width = renderSize * dpr
    const dpr = window.devicePixelRatio || 1;
    const scaledX = x * dpr;
    const scaledY = y * dpr;

    const col = Math.floor(scaledX / this.cs);
    const row = Math.floor(scaledY / this.cs);

    const validMoves = s.getValidMoves(s.currentColor, s.diceRoll);
    if (validMoves.length === 0) return;

    let clickedPos = null;

    let trackIdx = this.cells.findIndex(c => c.x === col && c.y === row);
    if (trackIdx !== -1) clickedPos = trackIdx;

    if (clickedPos === null) {
      for (let color in this.homeCells) {
        let idx = this.homeCells[color].findIndex(c => c.x === col && c.y === row);
        if (idx !== -1) {
          if (color === 'red') clickedPos = 52 + idx;
          if (color === 'green') clickedPos = 57 + idx;
          if (color === 'yellow') clickedPos = 62 + idx;
          if (color === 'blue') clickedPos = 67 + idx;
        }
      }
    }

    let selectedTid = null;
    if (clickedPos === null) {
      selectedTid = validMoves.find(id => {
        let t = s.tokens[id];
        if (t.pos !== -1) return false;
        let bc = this.bases[t.color];
        return (Math.abs(col + 0.5 - bc.x) < 2.5 && Math.abs(row + 0.5 - bc.y) < 2.5);
      });
    } else {
      selectedTid = validMoves.find(id => s.tokens[id].pos === clickedPos);
    }

    let clickedAnyOwnToken = null;
    for (let id in s.tokens) {
      let t = s.tokens[id];
      if (t.color === s.currentColor) {
        if (clickedPos === null) {
          let bc = this.bases[t.color];
          if (t.pos === -1 && (Math.abs(col + 0.5 - bc.x) < 2.5 && Math.abs(row + 0.5 - bc.y) < 2.5)) {
            clickedAnyOwnToken = id;
          }
        } else {
          if (t.pos === clickedPos) {
            clickedAnyOwnToken = id;
          }
        }
      }
    }

    if (selectedTid) {
      if (s.settings && s.settings.splitMoves) {
        let t = s.tokens[selectedTid];
        if (t.pos === -1) {
          if (s.remainingRoll >= 6) gameManager.moveToken(selectedTid, 6);
        } else {
          let maxSteps = s.remainingRoll;
          if (maxSteps > 1) {
            uiManager.showSplitModal(maxSteps, (steps) => {
              if (steps > 0 && steps <= maxSteps) {
                gameManager.moveToken(selectedTid, steps);
              }
            });
          } else {
            gameManager.moveToken(selectedTid, 1);
          }
        }
      } else {
        gameManager.moveToken(selectedTid, s.diceRoll);
      }
    } else if (clickedAnyOwnToken) {
      Sounds.play('error');
    }
  }
};

// ─── Game Manager ────────────────────────────────────────────
const gameManager = {
  state: null,
  blitzTimer: null,
  blitzTimeLeft: 15,
  currentBlitzAction: null,
  lastTickTime: null,

  startLocalGame() {
    const pc = parseInt(document.getElementById('local-player-count').value);
    const bc = parseInt(document.getElementById('local-bot-count').value);

    const players = [];
    for (let i = 0; i < pc; i++) {
      players.push({
        id: i,
        name: `Player ${i + 1}`,
        color: LudoEngine.COLORS[i],
        isBot: i >= (pc - bc)
      });
    }

    const settings = {
      threeSixes: document.getElementById('local-setting-threeSixes').checked,
      autoMove: document.getElementById('local-setting-autoMove').checked,
      blockades: document.getElementById('local-setting-blockades').checked,
      splitMoves: document.getElementById('local-setting-split').checked,
      bounties: document.getElementById('local-setting-bounties').checked,
      blitz: document.getElementById('local-setting-blitz').checked,
      alliance: document.getElementById('local-setting-alliance').checked
    };

    this.state = new LudoEngine.GameState(players, settings);
    AppState.mode = 'local';
    AppState.isSpectator = false;
    renderer.visualTokens = null;
    dice3DController.resetAll();
    uiManager.showGame();
    this.startTurnTimer();
    this.loop();
  },

  startOnlineGame(stateData) {
    this.state = new LudoEngine.GameState(stateData.players, stateData.settings);
    this.state.deserialize(stateData);
    AppState.mode = 'online_playing';
    renderer.visualTokens = null;
    dice3DController.resetAll();
    uiManager.showGame();
    this.startTurnTimer();
    this.loop();

    // Save active session for reconnection
    SafeStorage.setItem('ludo_active_room', AppState.roomCode);
    SafeStorage.setItem('ludo_player_id', AppState.playerId);
    const hostPlayer = stateData.players.find(p => p.id === AppState.playerId);
    SafeStorage.setItem('ludo_player_name', document.getElementById('player-name').value || (hostPlayer ? hostPlayer.name : ''));
    SafeStorage.setItem('ludo_player_color', AppState.selectedColor || (hostPlayer ? hostPlayer.color : ''));
  },

  startBlitzTimer(actionKey) {
    if (this.currentBlitzAction === actionKey) return;
    this.currentBlitzAction = actionKey;
  },

  stopBlitzTimer() {
    this.currentBlitzAction = null;
  },

  turnTimerInterval: null,
  startTurnTimer() {
    if (this.turnTimerInterval) return;
    this.turnTimerInterval = setInterval(() => {
      if (!this.state || this.state.winner) {
        this.stopTurnTimer();
        return;
      }
      
      const isOnline = AppState.mode === 'online_playing';
      const isBlitz = this.state.settings && this.state.settings.blitz;
      const hasTimer = isBlitz || isOnline;
      
      const blitzDisplay = document.getElementById('blitz-display');
      if (!hasTimer) {
        if (blitzDisplay) blitzDisplay.classList.add('hidden');
        return;
      }
      
      if (blitzDisplay) blitzDisplay.classList.remove('hidden');
      
      const timeout = isBlitz ? 15000 : 45000;
      const elapsed = Date.now() - (this.state.turnStartTime || Date.now());
      const timeLeft = Math.max(0, Math.ceil((timeout - elapsed) / 1000));
      
      const blitzTime = document.getElementById('blitz-time');
      if (blitzTime) blitzTime.innerText = timeLeft;
      
      // Host checks for AFK and executes the turn if time runs out
      if (AppState.playerId === 0 && timeLeft <= 0 && !this.state.currentPlayer.isBot) {
        console.log("AFK detected for player: ", this.state.currentPlayer.name);
        this.takeAFKTurn();
      }
      
      const isMyTurn = AppState.mode === 'local' 
        ? !this.state.currentPlayer.isBot 
        : (!AppState.isSpectator && this.state.currentPlayer.id === AppState.playerId);

      // Play warning sound when time is running out (last 5 seconds)
      if (isMyTurn && timeLeft > 0 && timeLeft <= 5) {
        if (this.lastTickTime !== timeLeft) {
          this.lastTickTime = timeLeft;
          Sounds.play('tick');
        }
      } else if (timeLeft > 5) {
        this.lastTickTime = null;
      }

      if (isMyTurn && timeLeft <= 0) {
        console.log("Local AFK timeout, auto-playing...");
        this.autoPlayCurrentTurn();
      }
    }, 500);
  },

  stopTurnTimer() {
    clearInterval(this.turnTimerInterval);
    this.turnTimerInterval = null;
    const blitzDisplay = document.getElementById('blitz-display');
    if (blitzDisplay) blitzDisplay.classList.add('hidden');
  },

  autoPlayCurrentTurn() {
    if (!this.state || this.state.winner) return;
    uiManager.cancelSplit();
    LudoBot.playTurn(this.state,
      () => this.rollDice(),
      (tid, steps) => {
        let st = steps || (this.state.settings.splitMoves ? this.state.remainingRoll : this.state.diceRoll);
        this.moveToken(tid, st);
      }
    );
  },

  async takeAFKTurn() {
    if (!this.state || this.state.winner) return;
    if (!this.state.hasRolled) {
      await this.rollDice(true);
    } else {
      const validMoves = this.state.getValidMoves(this.state.currentColor, this.state.diceRoll);
      if (validMoves.length > 0) {
        LudoBot.executeMoves(this.state, (tid, steps) => {
          let st = steps || (this.state.settings.splitMoves ? this.state.remainingRoll : this.state.diceRoll);
          this.moveToken(tid, st, true);
        });
      } else {
        this.state.nextTurn();
        if (AppState.mode === 'online_playing') {
          await multiplayerManager.pushState();
        }
        renderer.draw(this.state);
        uiManager.updateGameUI(this.state);
      }
    }
  },

  async rollDice(force = false) {
    if (!this.state || this.state.hasRolled || this.state.winner) return null;

    const currentColor = this.state.currentColor;

    if (AppState.mode === 'online_playing') {
      if (AppState.isSpectator) return null;
      const isAllowed = (this.state.currentPlayer.id === AppState.playerId) || 
                        (AppState.playerId === 0 && (this.state.currentPlayer.isBot || force));
      if (!isAllowed) return null;
    }

    // Determine roll value immediately before starting the animation
    let roll;
    if (this.state.guaranteedSix && this.state.guaranteedSix[this.state.currentColor]) {
      roll = 6;
      this.state.guaranteedSix[this.state.currentColor] = false;
    } else {
      roll = Math.floor(Math.random() * 6) + 1;
    }

    // Bad Luck Protection: If player has no active tokens on the board, count consecutive rolls.
    // If they roll 3 times without a 6, guarantee a 6 on their next turn.
    const hasActiveTokens = Object.values(this.state.tokens).some(t => t.color === currentColor && t.pos !== -1 && t.pos !== 100);
    if (!hasActiveTokens) {
      if (roll === 6) {
        if (this.state.consecutiveNoSix) this.state.consecutiveNoSix[currentColor] = 0;
      } else {
        if (this.state.consecutiveNoSix) {
          this.state.consecutiveNoSix[currentColor] = (this.state.consecutiveNoSix[currentColor] || 0) + 1;
          if (this.state.consecutiveNoSix[currentColor] >= 3) {
            this.state.guaranteedSix[currentColor] = true;
            this.state.consecutiveNoSix[currentColor] = 0;
            this.state.lastAction = `Bad Luck Protection: Next Roll is 6 for ${currentColor.toUpperCase()}!`;
          }
        }
      }
    } else {
      if (this.state.consecutiveNoSix) this.state.consecutiveNoSix[currentColor] = 0;
    }

    this.state.diceRoll = roll;
    this.state.rollId = Date.now();
    this.state.hasRolled = true;
    this.state.remainingRoll = roll;
    this.state.turnStartTime = Date.now(); // Reset timer for the move phase

    Sounds.play('roll');

    // Local/Optimistic game dice roll with 3D animation directly to the rolled number!
    const rollPromise = dice3DController.roll(currentColor, roll);

    // Legacy dice animation
    const dc = document.getElementById('dice-container');
    if (dc) dc.style.animation = 'flipDice 0.6s linear';
    let f = setInterval(() => {
      const dv = document.getElementById('dice-value');
      if (dv) dv.innerText = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'][Math.floor(Math.random() * 6)];
    }, 50);

    await rollPromise;
    clearInterval(f);
    if (dc) dc.style.animation = '';

    if (roll === 6) {
      Sounds.play('six');
      if (!this.state.settings || this.state.settings.threeSixes !== false) {
        this.state.sixesRolled++;
        if (this.state.sixesRolled >= 3) {
          this.state.hasRolled = false;
          this.state.sixesRolled = 0;
          this.state.nextTurn();
          this.state.lastAction = '3 Sixes Penalty! Turn lost.';
        }
      }
    } else {
      this.state.lastAction = '';
    }

    const dv = document.getElementById('dice-value');
    if (dv) dv.innerText = roll;

    if (AppState.mode === 'online_playing') {
      await multiplayerManager.pushState();
    }

    this.postRollCheck();
    return roll;
  },

  async animateNetworkRoll(rollResult, isNetworkSync = true) {
    const currentColor = this.state.currentColor;

    Sounds.play('roll');

    // Start 3D roll animation directly to the rolled value
    const rollPromise = dice3DController.roll(currentColor, rollResult);

    // Legacy dice (flickers in parallel)
    const dc = document.getElementById('dice-container');
    if (dc) dc.style.animation = 'flipDice 0.6s linear';
    let f = setInterval(() => {
      const dv = document.getElementById('dice-value');
      if (dv) dv.innerText = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'][Math.floor(Math.random() * 6)];
    }, 50);

    await rollPromise;
    clearInterval(f);
    if (dc) dc.style.animation = '';
    
    const dv = document.getElementById('dice-value');
    if (dv) dv.innerText = rollResult;

    if (rollResult === 6) {
      Sounds.play('six');
    }

    renderer.draw(this.state);
    uiManager.updateGameUI(this.state);
    this.postRollCheck(isNetworkSync);
  },

  async moveToken(tokenId, steps, force = false) {
    if (!this.state || !this.state.hasRolled || this.state.winner) return;
    if (!tokenId || !this.state.tokens[tokenId]) return;

    const backupStateStr = JSON.stringify(this.state.serialize());
    const oldVersion = multiplayerManager.version;

    let st = steps || this.state.diceRoll;
    const isMyTurn = (AppState.mode === 'online_playing' && !AppState.isSpectator && 
                      (this.state.currentPlayer.id === AppState.playerId || 
                      (AppState.playerId === 0 && (this.state.currentPlayer.isBot || force))));
    
    const moveResult = this.state.moveToken(tokenId, st);

    if (this.state.winner) {
      Sounds.play('victory');
    } else if (moveResult && moveResult.captured) {
      Sounds.play('capture');
    } else if (moveResult && moveResult.finished) {
      Sounds.play('home');
    } else {
      Sounds.play('move');
    }

    renderer.draw(this.state);
    uiManager.updateGameUI(this.state);

    if (AppState.mode === 'online_playing') {
      if (isMyTurn) {
        multiplayerManager.version++;
        const delta = this.state.serialize();

        const res = await multiplayerManager.queueStatePush(delta, oldVersion, backupStateStr);
        if (!res.success) {
          this.state.deserialize(JSON.parse(backupStateStr));
          multiplayerManager.version = oldVersion;
          renderer.draw(this.state);
          uiManager.updateGameUI(this.state);
          multiplayerManager.poll();
        }
      }
    }

    if (this.state.winner) {
      uiManager.showModal("Game Over", `${this.state.winner.toUpperCase()} WINS!`);
      this.stopTurnTimer();
    } else {
      setTimeout(() => this.postRollCheck(), 500);
    }
  },

  postRollCheck(isNetworkSync = false) {
    renderer.draw(this.state);
    uiManager.updateGameUI(this.state);

    if (isNetworkSync) return;

    if (!this.state.hasRolled) {
      setTimeout(() => this.loop(), 1000);
      return;
    }

    const validMoves = this.state.getValidMoves(this.state.currentColor, this.state.diceRoll);
    if (validMoves.length === 0) {
      setTimeout(async () => {
        const isMyTurn = (AppState.mode === 'online_playing' && !AppState.isSpectator && (this.state.currentPlayer.id === AppState.playerId || (AppState.playerId === 0 && this.state.currentPlayer.isBot)));
        this.state.nextTurn();
        if (isMyTurn) {
          await multiplayerManager.pushState();
        }
        renderer.draw(this.state);
        uiManager.updateGameUI(this.state);
        this.loop();
      }, 1000);
    } else if (this.state.currentPlayer.isBot) {
      setTimeout(() => this.loop(), 500);
    } else if (validMoves.length === 1 && (!this.state.settings || !this.state.settings.splitMoves) && (!this.state.settings || this.state.settings.autoMove !== false)) {
      if (AppState.mode === 'online_playing') {
        if (!AppState.isSpectator && (this.state.currentPlayer.id === AppState.playerId || (AppState.playerId === 0 && this.state.currentPlayer.isBot))) {
          setTimeout(() => this.moveToken(validMoves[0], this.state.diceRoll), 300);
        }
      } else {
        if (!this.state.currentPlayer.isBot) {
          setTimeout(() => this.moveToken(validMoves[0], this.state.diceRoll), 300);
        }
      }
    }
  },

  async loop() {
    if (!this.state || this.state.winner) return;

    renderer.draw(this.state);
    uiManager.updateGameUI(this.state);

    if (this.state.currentPlayer.isBot) {
      let shouldRunBot = false;
      if (AppState.mode === 'local') {
        shouldRunBot = true;
      } else if (AppState.mode === 'online_playing') {
        if (AppState.playerId === 0) shouldRunBot = true;
      }

      if (shouldRunBot) {
        if (!this.state.hasRolled) {
          setTimeout(() => this.rollDice(), 500);
        } else {
          const validMoves = this.state.getValidMoves(this.state.currentColor, this.state.diceRoll);
          if (validMoves.length > 0) {
            setTimeout(() => {
              LudoBot.executeMoves(this.state, (tid, steps) => {
                let st = steps || (this.state.settings.splitMoves ? this.state.remainingRoll : this.state.diceRoll);
                this.moveToken(tid, st);
              });
            }, 800);
          }
        }
      }
    }
  },

  quitGame() {
    this.state = null;
    this.stopTurnTimer();
    renderer.visualTokens = null;
    dice3DController.resetAll();
    if (AppState.mode === 'online_playing') {
      multiplayerManager.leaveRoom();
    }
    
    // Clear reconnection cache on deliberate exit
    SafeStorage.removeItem('ludo_active_room');
    SafeStorage.removeItem('ludo_player_id');
    SafeStorage.removeItem('ludo_player_name');
    SafeStorage.removeItem('ludo_player_color');
    const rejoinSection = document.getElementById('rejoin-section');
    if (rejoinSection) rejoinSection.classList.add('hidden');

    uiManager.showMainMenu();
  },

  async reconnectGame() {
    const roomCode = SafeStorage.getItem('ludo_active_room');
    const playerName = SafeStorage.getItem('ludo_player_name');
    const chosenColor = SafeStorage.getItem('ludo_player_color');
    
    if (!roomCode || !playerName || !chosenColor) return;
    
    uiManager.showModal("Reconnecting", "Rejoining game room...");
    
    try {
      const res = await new Promise((resolve) => {
        google.script.run.withSuccessHandler(resolve).joinRoom(roomCode, playerName, chosenColor);
      });
      
      uiManager.closeModal();
      
      if (res && res.success) {
        AppState.roomCode = roomCode;
        AppState.playerId = res.playerId;
        AppState.isSpectator = res.isSpectator;
        document.getElementById('player-name').value = playerName;
        multiplayerManager.selectColor(chosenColor);
        
        multiplayerManager.version = res.state.version;
        this.startOnlineGame(res.state);
        multiplayerManager.startPolling();
      } else {
        uiManager.showModal("Error", res ? res.error : "Failed to reconnect.");
        SafeStorage.removeItem('ludo_active_room');
        const rSec = document.getElementById('rejoin-section');
        if (rSec) rSec.classList.add('hidden');
      }
    } catch (e) {
      uiManager.showModal("Error", "Network error. Failed to reconnect.");
    }
  }
};

// ─── Multiplayer Manager ─────────────────────────────────────
const multiplayerManager = {
  version: 0,
  pollTimer: null,
  lobbyTimer: null,
  seenReactions: {},
  pushQueue: [],
  isPushing: false,

  selectColor(color) {
    document.querySelectorAll('.color-btn').forEach(btn => btn.classList.remove('selected'));
    document.querySelector(`.color-btn[data-color="${color}"]`).classList.add('selected');
    AppState.selectedColor = color;
  },

  updateColorAvailability(claimedColors) {
    document.querySelectorAll('.color-btn').forEach(btn => {
      if (claimedColors.includes(btn.dataset.color)) {
        btn.classList.add('disabled');
      } else {
        btn.classList.remove('disabled');
      }
    });

    const currentBtn = document.querySelector(`.color-btn[data-color="${AppState.selectedColor}"]`);
    if (currentBtn && currentBtn.classList.contains('disabled')) {
      const firstAvail = document.querySelector('.color-btn:not(.disabled)');
      if (firstAvail) this.selectColor(firstAvail.dataset.color);
    }
  },

  lobbyActive: false,
  startLobbyPolling() {
    this.lobbyActive = true;
    this.scheduleNextLobbyPoll(100);
  },

  stopLobbyPolling() {
    this.lobbyActive = false;
    if (this.lobbyTimer) {
      clearTimeout(this.lobbyTimer);
      this.lobbyTimer = null;
    }
  },

  scheduleNextLobbyPoll(delay = 3000) {
    if (this.lobbyTimer) clearTimeout(this.lobbyTimer);
    if (!this.lobbyActive) return;
    this.lobbyTimer = setTimeout(async () => {
      if (!this.lobbyActive) return;
      await this.refreshLobby();
      this.scheduleNextLobbyPoll(3000);
    }, delay);
  },

  async refreshLobby() {
    try {
      const rooms = await new Promise((resolve, reject) => {
        google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).getLobbyState();
      });

      const listDiv = document.getElementById('lobby-browser');
      listDiv.innerHTML = '';
      if (!rooms || rooms.length === 0) {
        listDiv.innerHTML = '<div style="text-align:center; color:#888; padding:20px;">No active public rooms found. Create one!</div>';
      } else {
        rooms.forEach(r => {
          let statusColor = r.status === 'WAITING' ? '#43A047' : '#FDD835';
          let row = document.createElement('div');
          row.className = 'lobby-room-item';
          row.innerHTML = `
            <div><strong>PIN: ${r.roomCode}</strong> (Host: ${r.host})</div>
            <div style="color:${statusColor}; font-size:14px; font-weight:bold;">${r.status} - ${r.playerCount}/4 Players</div>
          `;
          row.onclick = () => {
            document.getElementById('join-room-code').value = r.roomCode;
            this.updateColorAvailability(r.claimedColors || []);
          };
          listDiv.appendChild(row);
        });
      }

      const currentCode = document.getElementById('join-room-code').value.trim();
      if (currentCode && rooms) {
        const room = rooms.find(r => r.roomCode === currentCode);
        if (room) this.updateColorAvailability(room.claimedColors || []);
      }
    } catch (e) {
      console.log('Lobby fetch error');
    }
  },

  async hostGame() {
    const name = document.getElementById('player-name').value || 'Host';
    const isPrivate = document.getElementById('is-private-room').checked;
    const color = AppState.selectedColor;

    const settings = {
      threeSixes: document.getElementById('setting-threeSixes').checked,
      autoMove: document.getElementById('setting-autoMove').checked,
      blockades: document.getElementById('setting-blockades').checked,
      splitMoves: document.getElementById('setting-split').checked,
      bounties: document.getElementById('setting-bounties').checked,
      blitz: document.getElementById('setting-blitz').checked,
      alliance: document.getElementById('setting-alliance').checked
    };

    document.getElementById('online-status').innerText = 'Creating room...';
    try {
      const res = await new Promise((resolve, reject) => {
        google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).createRoom(name, isPrivate, color, settings);
      });
      if (res.success) {
        this.stopLobbyPolling();
        AppState.playerId = res.playerId;
        AppState.roomCode = res.roomCode;
        AppState.playerName = name;
        AppState.isSpectator = false;
        this.version = res.state.version;
        uiManager.showWaitingRoom(res.roomCode, res.state.players, true, res.state.spectators);
        this.startPolling();
      } else {
        document.getElementById('online-status').innerText = 'Failed to create room.';
      }
    } catch (e) {
      document.getElementById('online-status').innerText = e.message;
    }
  },

  async joinGame() {
    const code = document.getElementById('join-room-code').value.trim();
    const name = document.getElementById('player-name').value || 'Player';
    const color = AppState.selectedColor;
    if (!code) return;

    document.getElementById('online-status').innerText = 'Joining room...';
    try {
      const res = await new Promise((resolve, reject) => {
        google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).joinRoom(code, name, color);
      });
      if (res.success) {
        this.stopLobbyPolling();
        AppState.playerId = res.playerId;
        AppState.roomCode = code.toUpperCase();
        AppState.playerName = name;
        AppState.isSpectator = res.isSpectator;
        this.version = res.state.version;

        if (res.state.state === 'PLAYING') {
          AppState.mode = 'online_waiting'; // Fake wait to force transition in handleStateUpdate
          this.handleStateUpdate(res.state);
        } else {
          uiManager.showWaitingRoom(AppState.roomCode, res.state.players, AppState.playerId === 0, res.state.spectators);
        }
        this.startPolling();
      } else {
        document.getElementById('online-status').innerText = res.error;
      }
    } catch (e) {
      document.getElementById('online-status').innerText = e.message;
    }
  },

  async addBot() {
    const botColor = document.getElementById('bot-color-select').value;
    try {
      const res = await new Promise((resolve) => {
        google.script.run.withSuccessHandler(resolve).addBotToRoom(AppState.roomCode, botColor);
      });
    } catch (e) { }
  },

  async startGame() {
    try {
      await new Promise((resolve) => {
        google.script.run.withSuccessHandler(resolve).startGame(AppState.roomCode);
      });
    } catch (e) { }
  },

  pollingActive: false,
  visibilityListener: null,
  startPolling() {
    this.pollingActive = true;
    this.scheduleNextPoll(100);

    if (!this.visibilityListener) {
      this.visibilityListener = () => {
        if (!document.hidden && this.pollingActive) {
          this.scheduleNextPoll(50);
        }
      };
      document.addEventListener('visibilitychange', this.visibilityListener);
    }
  },

  stopPolling() {
    this.pollingActive = false;
    if (this.pollTimer) {
      clearTimeout(this.pollTimer);
      this.pollTimer = null;
    }
    if (this.visibilityListener) {
      document.removeEventListener('visibilitychange', this.visibilityListener);
      this.visibilityListener = null;
    }
  },

  scheduleNextPoll(delay = null) {
    if (this.pollTimer) clearTimeout(this.pollTimer);
    if (!this.pollingActive) return;

    let targetDelay = delay;
    if (targetDelay === null) {
      if (document.hidden) {
        targetDelay = 12000;
      } else {
        targetDelay = 2000;
        if (gameManager.state && AppState.mode === 'online_playing' && gameManager.state.state === 'PLAYING') {
          const isMyTurn = (!AppState.isSpectator && (gameManager.state.currentPlayer.id === AppState.playerId || (AppState.playerId === 0 && gameManager.state.currentPlayer.isBot)));
          if (isMyTurn) targetDelay = 5000;
        }
      }
    }

    this.pollTimer = setTimeout(async () => {
      if (!this.pollingActive) return;
      await this.poll();
      this.scheduleNextPoll(null);
    }, targetDelay);
  },

  async poll() {
    if (!AppState.roomCode) return;
    try {
      const res = await new Promise((resolve) => {
        google.script.run.withSuccessHandler(resolve).getRoomState(AppState.roomCode, this.version);
      });

      if (!res || !res.success) {
        this.stopPolling();
        uiManager.showModal("Error", res ? res.error : 'Connection lost.');
        uiManager.showMainMenu();
        return;
      }

      if (res.updated) {
        this.version = res.state.version;
        this.handleStateUpdate(res.state);
      }
    } catch (e) {
      console.error("Poll error", e);
    }
  },

  handleStateUpdate(state) {
    if (AppState.mode === 'online_waiting') {
      if (state.state === 'WAITING') {
        uiManager.showWaitingRoom(AppState.roomCode, state.players, AppState.playerId === 0, state.spectators);
      } else if (state.state === 'PLAYING') {
        const grCode = document.getElementById('game-room-code');
        if (grCode) grCode.innerText = AppState.roomCode;
        const roomInfo = document.getElementById('room-info');
        if (roomInfo) roomInfo.classList.remove('hidden');
        gameManager.startOnlineGame(state);
      }
    } else if (AppState.mode === 'online_playing') {
      if (!gameManager.state) return;

      this.pollReactions(state);

      let previousRollId = gameManager.state.rollId;

      if (state.rollId && state.rollId !== previousRollId) {
        gameManager.state.deserialize(state);
        gameManager.animateNetworkRoll(state.diceRoll, true);
      } else {
        gameManager.state.deserialize(state);
        renderer.draw(gameManager.state);
        uiManager.updateGameUI(gameManager.state);
      }

      if (gameManager.state.winner) {
          let winnerText = `${gameManager.state.winner.toUpperCase()} WINS!`;
          uiManager.showModal("Game Over", `
            <div style="text-align:center;">
              <h2 style="color:var(--accent-gold);margin-bottom:20px;">${winnerText}</h2>
              <button class="btn-primary" onclick="gameManager.quitGame()" style="margin-top:15px;width:100%;">Return to Lobby</button>
            </div>
          `);
          this.stopPolling();
          gameManager.stopTurnTimer();
        }

        if (AppState.playerId === 0 && !gameManager.state.winner) {
          if (gameManager.state.currentPlayer.isBot && !gameManager.state.hasRolled) {
            gameManager.loop();
          } else if (!gameManager.state.currentPlayer.isBot) {
            const timeout = gameManager.state.settings.blitz ? 15000 : 45000;
            const elapsed = Date.now() - (gameManager.state.turnStartTime || Date.now());
            if (elapsed > timeout) {
              console.log("AFK Player detected! Host taking turn for: ", gameManager.state.currentPlayer.name);
              gameManager.takeAFKTurn();
            }
          }
        }
    }
  },

  queueStatePush(delta, oldVersion, backupStateStr) {
    return new Promise((resolve) => {
      this.pushQueue.push({ delta, oldVersion, backupStateStr, resolve });
      this.processPushQueue();
    });
  },

  async processPushQueue() {
    if (this.isPushing || this.pushQueue.length === 0) return;
    this.isPushing = true;

    const task = this.pushQueue.shift();
    let retries = 3;
    let delay = 300;
    let success = false;

    while (retries > 0 && !success) {
      try {
        const res = await new Promise((resolve) => {
          google.script.run.withSuccessHandler(resolve).updateRoomState(AppState.roomCode, task.delta, task.oldVersion);
        });

        if (res && res.success) {
          if (res.state.version > this.version) {
             this.version = res.state.version;
          }
          success = true;
          task.resolve({ success: true, version: res.state.version });
        } else {
          if (res && res.error && res.error.includes('Lock')) {
            retries--;
            if (retries > 0) {
              await new Promise(r => setTimeout(r, delay));
              delay *= 2;
              continue;
            }
          }
          console.error("Sync conflict or error", res);
          task.resolve({ success: false, error: res ? res.error : 'Unknown error' });
          success = true; // exit loop
        }
      } catch (e) {
        console.error(e);
        task.resolve({ success: false, error: e.message });
        success = true; // exit loop
      }
    }

    this.isPushing = false;
    this.processPushQueue();
  },

  async pushState() {
    if (AppState.mode !== 'online_playing' || !gameManager.state || AppState.isSpectator) return false;
    const delta = gameManager.state.serialize();
    const currentVersion = this.version;

    // Optimistically increment locally to avoid double-pushes, but revert on fail
    this.version++;

    const res = await this.queueStatePush(delta, currentVersion, null);
    if (!res.success) {
       this.version = currentVersion; // Revert the optimistic version bump!
       this.poll();
    }
    return res.success;
  },

  leaveRoom() {
    this.stopPolling();
    if (AppState.mode === 'online_playing' && AppState.roomCode && AppState.playerId !== null && !AppState.isSpectator) {
      google.script.run.leaveRoom(AppState.roomCode, AppState.playerId);
    }
    AppState.roomCode = null;
    AppState.playerId = null;
    AppState.isSpectator = false;
    
    // Clear session storage on deliberate exit
    SafeStorage.removeItem('ludo_active_room');
    SafeStorage.removeItem('ludo_player_id');
    SafeStorage.removeItem('ludo_player_name');
    SafeStorage.removeItem('ludo_player_color');
    const rejoinSection = document.getElementById('rejoin-section');
    if (rejoinSection) rejoinSection.classList.add('hidden');

    uiManager.showMainMenu();
  },

  async sendReaction(emoji) {
    if (!AppState.roomCode || AppState.playerId === null) return;
    try {
      await new Promise((resolve, reject) => {
        google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).sendReaction(AppState.roomCode, AppState.playerId, emoji);
      });
    } catch (e) { }
  },

  pollReactions(state) {
    if (!state.reactions) return;
    const now = new Date().getTime();
    state.reactions.forEach(r => {
      const key = r.time + '_' + r.playerId;
      if (!this.seenReactions[key]) {
        this.seenReactions[key] = true;
        if (now - r.time < 10000) {
          this.showEmojiPopup(r.playerId, r.emoji, state);
        }
      }
    });
  },

  showEmojiPopup(playerId, emoji, state) {
    const p = state.players.find(x => x.id === playerId);
    if (!p) return;

    let b = renderer.bases[p.color];
    let cs = renderer.cs;
    let px = b.x * cs;
    let py = b.y * cs;

    let el = document.createElement('div');
    el.className = 'emoji-popup';
    el.innerText = emoji;

    // Premium Quick Chat bubble styling if it is a phrase
    if (emoji.length > 3) {
      el.style.fontSize = '14px';
      el.style.fontWeight = 'bold';
      el.style.background = '#8A2BE2'; // Deep purple bubble
      el.style.color = 'white';
      el.style.padding = '8px 14px';
      el.style.borderRadius = '18px';
      el.style.border = '1.5px solid #FFD700'; // Gold border
      el.style.boxShadow = '0 6px 16px rgba(0,0,0,0.3)';
      el.style.whiteSpace = 'nowrap';
    }

    el.style.left = (px - 20) + 'px';
    el.style.top = (py - 20) + 'px';

    const container = document.getElementById('reaction-container');
    if (container) container.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }
};

// ─── Initialize ──────────────────────────────────────────────
window.onload = () => {
  darkModeManager.init();
  soundManager.init();
  themeManager.init();
  renderer.init();

  // Show rejoin game button if session is active
  const activeRoom = SafeStorage.getItem('ludo_active_room');
  const rejoinSection = document.getElementById('rejoin-section');
  const rejoinRoomCode = document.getElementById('rejoin-room-code');
  if (activeRoom && rejoinSection && rejoinRoomCode) {
    rejoinRoomCode.innerText = activeRoom;
    rejoinSection.classList.remove('hidden');
  }
};
