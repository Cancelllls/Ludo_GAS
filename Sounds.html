<script>
const Sounds = (function() {
  let audioCtx = null;
  let masterGain = null;

  function initContext() {
    if (!audioCtx) {
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.gain.setValueAtTime(0.35, audioCtx.currentTime); // standard volume
        masterGain.connect(audioCtx.destination);
      } catch (e) {
        console.error("Web Audio API not supported:", e);
      }
    }
    if (audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }

  // Bind init context to user gestures
  document.addEventListener('click', initContext, { once: false, passive: true });
  document.addEventListener('touchstart', initContext, { once: false, passive: true });

  return {
    play(type) {
      try {
        const isMuted = localStorage.getItem('ludoKingMuted') === 'true';
        if (isMuted) return;

        initContext();
        if (!audioCtx) return;

        const now = audioCtx.currentTime;

        if (type === 'roll') {
          // Retro triangle pitch sweep up
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(masterGain);

          osc.type = 'triangle';
          osc.frequency.setValueAtTime(120, now);
          osc.frequency.exponentialRampToValueAtTime(700, now + 0.15);

          gain.gain.setValueAtTime(0.25, now);
          gain.gain.linearRampToValueAtTime(0, now + 0.15);

          osc.start(now);
          osc.stop(now + 0.16);

        } else if (type === 'move') {
          // Classic double-beep coin sound
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(masterGain);

          osc.type = 'sine';
          osc.frequency.setValueAtTime(987.77, now); // B5
          osc.frequency.setValueAtTime(1318.51, now + 0.05); // E6

          gain.gain.setValueAtTime(0.18, now);
          gain.gain.setValueAtTime(0.18, now + 0.05);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.15);

          osc.start(now);
          osc.stop(now + 0.16);

        } else if (type === 'six') {
          // Arpeggio power-up for rolling 6
          const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
          notes.forEach((freq, idx) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(masterGain);

            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, now + idx * 0.04);

            gain.gain.setValueAtTime(0, now + idx * 0.04);
            gain.gain.linearRampToValueAtTime(0.2, now + idx * 0.04 + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + idx * 0.04 + 0.12);

            osc.start(now + idx * 0.04);
            osc.stop(now + idx * 0.04 + 0.13);
          });

        } else if (type === 'capture') {
          // Downward crash explosion
          const osc1 = audioCtx.createOscillator();
          const osc2 = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc1.connect(gain);
          osc2.connect(gain);
          gain.connect(masterGain);

          osc1.type = 'sawtooth';
          osc1.frequency.setValueAtTime(320, now);
          osc1.frequency.linearRampToValueAtTime(30, now + 0.3);

          osc2.type = 'triangle';
          osc2.frequency.setValueAtTime(190, now);
          osc2.frequency.linearRampToValueAtTime(15, now + 0.3);

          gain.gain.setValueAtTime(0.3, now);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);

          osc1.start(now);
          osc2.start(now);
          osc1.stop(now + 0.31);
          osc2.stop(now + 0.31);

        } else if (type === 'home') {
          // Sparkly chimes for reaching home
          const notes = [659.25, 783.99, 987.77, 1318.51, 1567.98]; // E5, G5, B5, E6, G6
          notes.forEach((freq, idx) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(masterGain);

            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, now + idx * 0.06);

            gain.gain.setValueAtTime(0, now + idx * 0.06);
            gain.gain.linearRampToValueAtTime(0.15, now + idx * 0.06 + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + idx * 0.06 + 0.25);

            osc.start(now + idx * 0.06);
            osc.stop(now + idx * 0.06 + 0.26);
          });

        } else if (type === 'victory') {
          // Full retro chiptune fanfare melody
          const melody = [
            { f: 523.25, d: 0.12 }, // C5
            { f: 659.25, d: 0.12 }, // E5
            { f: 783.99, d: 0.12 }, // G5
            { f: 1046.50, d: 0.24 }, // C6
            { f: 880.00, d: 0.12 }, // A5
            { f: 1046.50, d: 0.48 } // C6
          ];
          let timeOffset = 0;
          melody.forEach((note) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(masterGain);

            osc.type = 'square';
            osc.frequency.setValueAtTime(note.f, now + timeOffset);

            gain.gain.setValueAtTime(0, now + timeOffset);
            gain.gain.linearRampToValueAtTime(0.15, now + timeOffset + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + timeOffset + note.d);

            osc.start(now + timeOffset);
            osc.stop(now + timeOffset + note.d + 0.01);

            timeOffset += note.d * 1.15;
          });

        } else if (type === 'error') {
          // Short low-frequency buzzer
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(masterGain);

          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(140, now);
          osc.frequency.linearRampToValueAtTime(70, now + 0.18);

          gain.gain.setValueAtTime(0.2, now);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);

          osc.start(now);
          osc.stop(now + 0.19);

        } else if (type === 'tick') {
          // Short woodblock tick for time warning
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(masterGain);

          osc.type = 'sine';
          osc.frequency.setValueAtTime(1400, now);

          gain.gain.setValueAtTime(0.08, now);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.02);

          osc.start(now);
          osc.stop(now + 0.03);
        }
      } catch (e) {
        console.error("Audio playback error:", e);
      }
    }
  };
})();
</script>
